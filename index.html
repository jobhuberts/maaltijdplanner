function toNaam(url) {
  return url.split("/").pop().replace(/-/g, " ").replace(/^./, c => c.toUpperCase());
}
function toImg(url) {
  const m = url.match(/R-R(\d+)/);
  return m ? `https://static.ah.nl/static/recepten/img_${m[1]}_300x300_FP.jpg` : null;
}
function toSeizoen(naam) {
  const s = naam.toLowerCase();
  const sz = new Set();

  // Lente — verse jonge groenten, asperges, erwten
  if (["asperge","radijs","tuinerwt","doperwt","rucola"].some(w => s.includes(w))) sz.add("lente");
  // Prei en spinazie zijn lente & winter
  if (s.includes("spinazie")) { sz.add("lente"); sz.add("winter"); }
  if (s.includes("prei")) { sz.add("lente"); sz.add("winter"); }
  // Venkel lente & herfst
  if (s.includes("venkel")) { sz.add("lente"); sz.add("herfst"); }

  // Zomer — mediterraan, grill, salades, zomergroenten
  if (["watermeloen","nectarine","mango","mais","avocado","zomer","gegrild",
       "snoeptomaat","halloumi","feta"].some(w => s.includes(w))) sz.add("zomer");
  if (s.includes("courgette")) { sz.add("zomer"); sz.add("lente"); }
  if (s.includes("aubergine")) { sz.add("zomer"); sz.add("herfst"); }
  if (s.includes("tomaat") || s.includes("tomaatje")) { sz.add("zomer"); sz.add("herfst"); }
  if (s.includes("paprika")) { sz.add("zomer"); sz.add("herfst"); }
  if (["salade","couscoussalade","orzosalade","bietensalade","watermeloen"].some(w => s.includes(w))) sz.add("zomer");

  // Herfst — pompoenen, paddenstoelen, wortelgroenten, stoofperen
  if (["pompoen","knolsel","pastinaak","stoofpeer","kastanje",
       "rode biet","winterpeen"].some(w => s.includes(w))) sz.add("herfst");
  if (s.includes("biet")) sz.add("herfst");
  if (s.includes("wortel") || s.includes("peen")) { sz.add("herfst"); sz.add("winter"); }
  if (s.includes("paddenstoel") || s.includes("champignon")) { sz.add("herfst"); sz.add("winter"); }
  if (s.includes("appel") || s.includes("peer")) sz.add("herfst");
  if (s.includes("boerenkool")) { sz.add("herfst"); sz.add("winter"); }
  if (s.includes("rodekool")) { sz.add("herfst"); sz.add("winter"); }

  // Winter — stamppot, stoof, zuurkool, peulvruchten, soep
  if (["stamppot","zuurkool","hutspot","snert","erwt"].some(w => s.includes(w))) sz.add("winter");
  if (s.includes("stoof")) { sz.add("herfst"); sz.add("winter"); }
  if (["linzen","kikkererwt","boon","bonen"].some(w => s.includes(w))) { sz.add("herfst"); sz.add("winter"); }
  if (s.includes("soep")) { sz.add("herfst"); sz.add("winter"); }
  if (s.includes("andijvie") || s.includes("witlof") || s.includes("spitskool")) sz.add("winter");
  if (s.includes("naan") || s.includes("curry") || s.includes("tikka") || s.includes("butter chicken")) {
    sz.add("herfst"); sz.add("winter");
  }

  // Jaarrond — pasta, rijst, noedels, wraps, pizza
  if (["spaghetti","lasagne","tagliatelle","linguine","macaroni","orecchiette",
       "tortellini","orzo","pasta"].some(w => s.includes(w))) {
    ["lente","zomer","herfst","winter"].forEach(x => sz.add(x));
  }
  if (["nasi","rijst","risotto","noedel","noodle","wrap","enchilada","tiktok"].some(w => s.includes(w))) {
    ["lente","zomer","herfst","winter"].forEach(x => sz.add(x));
  }
  if (["quiche","taart","plaattaart"].some(w => s.includes(w))) {
    // Quiches zijn seizoensgebonden aan hun vulling — al gedekt hierboven
    // Als nog niets, voeg herfst+winter toe als default voor hartige taarten
    if (sz.size === 0) { sz.add("herfst"); sz.add("winter"); }
  }

  return [...sz];
}

// ── Datum helpers ─────────────────────────────────────────────────────────────
// Geeft ISO datum van vandaag
function vandaagISO() {
  return new Date().toISOString().split("T")[0];
}

// Geeft ISO datum n dagen voor- of achteruit
function datumOffset(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}

// Volledige dagnaam (Maandag, Dinsdag, …)
function dagNaamVol(isoDate) {
  return ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"][new Date(isoDate+"T00:00:00").getDay()];
}

// Korte datumweergave DD/MM
function formatDDMM(isoDate) {
  if (!isoDate) return "";
  const [,m,d] = isoDate.split("-");
  return `${d}/${m}`;
}

// Relatief label t.o.v. vandaag ("Vandaag", "Morgen", "Gisteren", …)
function relatieveLabel(isoDate) {
  const today = vandaagISO();
  if (isoDate === today) return "Vandaag";
  const diff = Math.round((new Date(isoDate+"T00:00:00") - new Date(today+"T00:00:00")) / 86400000);
  if (diff === 1) return "Morgen";
  if (diff === -1) return "Gisteren";
  if (diff === -2) return "Eergisteren";
  return null;
}

// Korte weernaam (ma, di, …)
function weerDagKort(isoDate) {
  return ["zo","ma","di","wo","do","vr","za"][new Date(isoDate+"T00:00:00").getDay()];
}

// Migreer oud planning-format (weekdag-sleutels) naar ISO-datumsleutels
function migreerPlanning(p) {
  if (!p || typeof p !== "object") return {};
  if (!p.maandag && !p.dinsdag && !p.woensdag && !p.donderdag) return p; // al nieuw formaat
  const nu = new Date();
  const dagenTotMa = (1 - nu.getDay() + 7) % 7 || 7;
  const keyMap = { maandag: 0, dinsdag: 1, woensdag: 2, donderdag: 3 };
  const result = {};
  for (const [weekdag, offset] of Object.entries(keyMap)) {
    if (p[weekdag]) {
      const d = new Date(nu);
      d.setDate(d.getDate() + dagenTotMa + offset);
      result[d.toISOString().split("T")[0]] = p[weekdag];
    }
  }
  return result;
}

                    <span style={{ fontSize: 12, color: i === 0 ? G.tekst : G.tekstMid }}>{formatDatum(d)}</span>
                    {i === 0 && <span style={{ fontSize: 10, background: G.groenPale, color: G.groenMid, padding: "1px 6px", borderRadius: 10 }}>laatste keer</span>}
                  </div>
                ))}
                {gemaaktData.length > 5 && <div style={{ fontSize: 11, color: G.tekstZacht }}>+ {gemaaktData.length - 5} eerdere keren</div>}
              </div>
            )}
            <button onClick={markeerGemaakt} style={{ padding: "5px 12px", background: "transparent", border: `1px solid ${G.zandMid}`, color: G.tekstMid, borderRadius: 7, cursor: "pointer", fontSize: 11.5 }}>
              + Vandaag gemaakt
            </button>
          </div>

          {/* Opslaan */}
          <button
            onClick={() => onSave({ notes, seizoen: seizoenen, tags, rating, gemaaktData, favoriet, laatstGemaakt: gemaaktData[0] || recept.laatstGemaakt })}
            style={{ width: "100%", padding: "8px 14px", background: G.groen, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 500 }}
          >
            Opslaan
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── PAGINA: WEEKPLANNING ───────────────────────────────────────────────────
function PlannerPage({ planning, setPlanning, recepten, setRecepten, gezinData, isMobile = false }) {
  const mobile = isMobile;

  // Selectie: welke aankomende dagen worden ingepland (voor Plan selectie knop)

  useEffect(() => {

  // PDF tekst parsen voor ingrediënten
  const handlePDFChange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadNaam(file.name);
    setPdfIngredienten([]);
    setPdfStatus("laden");

    try {
      // Lees PDF als base64
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      // Stuur naar Claude API als PDF document
      const data = await claudeFetch({
        model: "claude-sonnet-4-5",
        max_tokens: 500,
        messages: [{
          role: "user",
          content: [
            {
              type: "document",
              source: { type: "base64", media_type: "application/pdf", data: base64 }
            },
            {
              type: "text",
              text: "Dit is een Albert Heijn kassabon of factuur. Geef een lijst van alle INGREDIENTEN en LEVENSMIDDELEN die je herkent. Geef ALLEEN de productnamen terug, elk op een nieuwe regel, zonder nummers, hoeveelheden, prijzen of andere tekst. Geen inleiding. Alleen de namen, maximaal 40 items."
            }
          ]
        }]
      });
      const tekst = data.content?.[0]?.text || "";

      if (!tekst.trim()) {
        setPdfStatus("leeg");
        return;
      }

      // Verwerk de response: elke regel is een ingrediënt
      const items = tekst
        .split("\n")
        .map(r => r.replace(/^[-•*\d.]+\s*/, "").trim())
        .filter(r => r.length > 1 && r.length < 60)
        .map(r => r.charAt(0).toUpperCase() + r.slice(1))
        .slice(0, 40);

      setPdfIngredienten(items);
      setPdfStatus(items.length > 0 ? "ok" : "leeg");
    } catch(err) {
      console.error("PDF fout:", err.message);
      if (err.message && err.message.includes("401")) {
        setPdfStatus("geen-key");

        setPdfStatus("fout");

  };

  const voegHandmatigToe = () => {
    const items = handmatigInput.split(/[,;\n]+/).map(s => s.trim()).filter(s => s.length > 1);
    if (items.length === 0) return;

  const verwijderHandmatig = (item) => setHandmatigIngr(prev => prev.filter(i => i !== item));
  const verwijderPdf = (item) => setPdfIngredienten(prev => prev.filter(i => i !== item));

  // Lokale tekstparser — werkt altijd, ook zonder API key
  const BEKENDE_INGREDIENTEN = [
    "pasta","spaghetti","tagliatelle","macaroni","orzo","rijst","noedels","couscous","quinoa","bulgur",
    "spinazie","broccoli","courgette","paprika","ui","wortel","peen","prei","knoflook","tomaten","tomaat",
    "champignons","champignon","aubergine","pompoen","bloemkool","boerenkool","andijvie","witlof","venkel",
    "sperziebonen","peultjes","spruitjes","savooiekool","spitskool","rodekool","witlof","radicchio",
    "kikkererwten","linzen","bonen","kidney","doperwten","mais","edamame","witte bonen","bruine bonen",
    "ei","eieren","melk","room","kaas","feta","mozzarella","ricotta","yoghurt","creme fraiche","mascarpone",
    "cottage cheese","kwark","halloumi","geitenkaas","parmezaan","cheddar",
    "boter","olijfolie","zonnebloemolie","kokosvet",
    "pesto","tomatensaus","passata","kokosmelk","bouillon","sojasaus","ketjap","miso","tahini","sambal",
    "bloem","paneermeel","brood","naan","tortilla","wraps","pitabrood",
    "zalm","tonijn","garnalen","makreel","sardines","kabeljauw",
    "citroen","limoen","sinaasappel","appel","peer","mango","avocado","mais",
    "noten","pijnboompitten","amandelen","walnoten","cashewnoten","hazelnoten","sesamzaad","chiazaad",
    "basilicum","peterselie","dille","oregano","tijm","rozemarijn","koriander","munt","bieslook",
    "gember","kurkuma","paprikapoeder","komijn","kaneel","kardemom","chilipoeder","kerrie",
    "azijn","balsamico","mosterd","honing","ahornsiroop","suiker","zout",
    "tofu","tempeh","seitan","quorn",
    "aardappelen","aardappel","zoete aardappel","bataat"
  ];

  const parseTekstLokaal = (tekst) => {
    const regels = tekst.split(/[\n,;]+/);
    const gevonden = new Set();
    regels.forEach(regel => {
      const r = regel.toLowerCase().trim();
      BEKENDE_INGREDIENTEN.forEach(ing => {
        if (r.includes(ing)) {
          gevonden.add(ing.charAt(0).toUpperCase() + ing.slice(1));
        }
      });
      // Ook losse woorden van 4+ tekens die geen prijs/getal zijn
      const woorden = r.split(/\s+/);
      woorden.forEach(w => {
        if (w.length >= 4 && !/[\d€.,]/.test(w) && !/^(voor|met|van|het|een|aan|uit|per|pak|zak|fles|blik|los|vers|bio|ah|bonus)$/.test(w)) {
          const match = BEKENDE_INGREDIENTEN.find(ing => ing.startsWith(w.substring(0,5)));
          if (match) gevonden.add(match.charAt(0).toUpperCase() + match.slice(1));
        }
      });
    });
    return [...gevonden].slice(0, 40);
  };

  const verwerkPlakTekst = async () => {
    if (!plakTekst.trim()) return;
    setPlakStatus("laden");

    // Probeer eerst via API als key beschikbaar is
    const apiKey = loadApiKey();
    if (apiKey) {
      try {
        const data = await claudeFetch({
          model: "claude-sonnet-4-5",
          max_tokens: 400,
          messages: [{
            role: "user",
            content: `Dit is de tekst van een Albert Heijn kassabon of boodschappenlijst. Geef uitsluitend de ingrediënten en levensmiddelen terug die je herkent, elk op een nieuwe regel. Geen hoeveelheden, prijzen of andere tekst. Geen inleiding.\n\n${plakTekst.substring(0, 3000)}`
          }]
        });
        const tekst = data.content?.[0]?.text || "";
        const items = tekst.split("\n")
          .map(r => r.replace(/^[-•*\d.]+\s*/, "").trim())
          .filter(r => r.length > 1 && r.length < 60)
          .map(r => r.charAt(0).toUpperCase() + r.slice(1))
          .slice(0, 40);
        if (items.length > 0) {
          setPdfIngredienten(prev => [...new Set([...prev, ...items])]);
          setPlakStatus("ok");
          setPlakTekst("");
          return;
        }
      } catch(e) {
        // Val terug op lokale parsing
      }
    }

    // Lokale fallback
    const items = parseTekstLokaal(plakTekst);
    setPdfIngredienten(prev => [...new Set([...prev, ...items])]);
    setPlakStatus("ok");
    setPlakTekst("");
  };

    const planWeek = () => {
    const maand = new Date().getMonth();
    const huidigSeizoen = maand <= 1 || maand === 11 ? "winter" : maand <= 4 ? "lente" : maand <= 7 ? "zomer" : "herfst";
    const nu = Date.now();
    const TWEE_WEKEN = 14 * 24 * 60 * 60 * 1000;

    // Recepten die de afgelopen 4 dagen al ingepland waren (voor overlap-straf)
    const vandaag = vandaagISO();
    const recentePlanningIds = new Set(
      Object.entries(planning)
        .filter(([k]) => k < vandaag && k >= datumOffset(-4))
        .map(([,v]) => v.recept?.id)
        .filter(Boolean)
    );

    // ── Gezinsprofiel: dieetwensen ──────────────────────────────────────────
    // Verzamel alle unieke dieetwensen van alle gezinsleden (lowercase)
    const alleDieetwensen = gezinData
      ? [...new Set(gezinData.flatMap(lid => lid.dieet || []).map(d => d.toLowerCase().trim()))]
      : [];

    // Koppel dieetwens aan ingrediënt-sleutelwoorden om in receptnamen te zoeken
    const DIEET_KEYWORDS = {
      "vegetarisch":  ["kip","vlees","gehakt","spek","bacon","kalkoen","lam","varken","tartaar","biefstuk","worst","hamburger","pulled"],
      "veganistisch": ["kip","vlees","gehakt","spek","bacon","kalkoen","lam","varken","tartaar","biefstuk","worst","hamburger","pulled","kaas","feta","ricotta","mascarpone","halloumi","cottagecheese","mozzarella"],
      "vis":          ["zalm","tonijn","forel","garnalen","zeebaars","haring","kabeljauw","ansjovis","makreel","inktvis","seafood"],
      "glutenvrij":   ["pasta","spaghetti","tagliatelle","orzo","lasagne","noedels","wrap","macaroni","linguine","tortellini","gnocchi"],
      "noten":        ["noten","cashew","pinda","amandel","pistache","walnoot","pecan","hazelnoot"],
      "lactosevrij":  ["kaas","feta","ricotta","mascarpone","room","halloumi","cottagecheese","mozzarella","yoghurt"],
    };

    // Weer samenvatting voor uitleg
    const gemiddeldTemp = weer.length > 0
      ? Math.round(weer.slice(0,5).reduce((s,w) => s + w.temp, 0) / Math.min(5, weer.length))
      : null;
    const regenDagen = weer.slice(0,5).filter(w => w.icon === "🌧️" || w.icon === "🌦️").length;
    const weerType = gemiddeldTemp !== null
      ? (gemiddeldTemp >= 20 ? "warm" : gemiddeldTemp >= 14 ? "lekker" : gemiddeldTemp >= 8 ? "fris" : "koud")
      : null;

    // Categorie-indeling voor variatie
    const CATS = {
      pasta:    ["spaghetti","pasta","orzo","tagliatelle","linguine","macaroni","orecchiette","tortellini","lasagne"],
      stamppot: ["stamppot"],
      stoof:    ["stoof","stoofpot"],
      traybake: ["traybake","plaattaart","ovenschotel"],
      wrap:     ["wrap","enchilada"],
      rijst:    ["nasi","rijst","risotto"],
      soep:     ["soep"],
      noedels:  ["noedels","noodles"],
      quiche:   ["quiche","taart"],
      salade:   ["salade"],
      curry:    ["curry","tikka","butter"],
    };

    function getCat(naam) {
      const n = naam.toLowerCase();
      for (const [cat, ws] of Object.entries(CATS)) {
        if (ws.some(w => n.includes(w))) return cat;
      }
      return "overig";
    }

    // Recente gemaaktData (afgelopen 2 weken)
    function recentGemaakt(r) {
      if (!r.gemaaktData || r.gemaaktData.length === 0) return false;
      const laatste = new Date(r.gemaaktData[0]).getTime();
      return (nu - laatste) < TWEE_WEKEN;
    }

    // Score: positief = beter
    function score(r, gebruikteCats) {
      let s = 0;

      // 1. Rating: 4-5 sterren = goed (kans groot), 1-3 = zelden
      if (r.rating === 5) s += 8;
      else if (r.rating === 4) s += 5;
      else if (r.rating === 3) s += 1;   // soms, niet vaak
      else if (r.rating <= 2 && r.rating > 0) s -= 2; // bijna nooit
      else s += 2; // geen rating: neutrale kans

      // 2. Seizoen
      const inSeizoen = Array.isArray(r.seizoen) ? r.seizoen.includes(huidigSeizoen) : r.seizoen === huidigSeizoen;
      if (inSeizoen) s += 3;
      if (!r.seizoen || (Array.isArray(r.seizoen) && r.seizoen.length === 0)) s += 1;

      // 3. Weer-aanpassing
      if (weerType === "koud" || weerType === "fris") {
        const troostEten = getCat(r.naam);
        if (["stoof","stamppot","soep","curry"].includes(troostEten)) s += 2;
        if (troostEten === "salade") s -= 2;
      }
      if (weerType === "warm") {
        if (getCat(r.naam) === "salade") s += 2;
        if (["stoof","stamppot"].includes(getCat(r.naam))) s -= 1;
      }

      // 4. Variatie: straf voor herhaalde categorie
      if (gebruikteCats.includes(getCat(r.naam))) s -= 5;

      // 5. Recente planning overlap vermijden (afgelopen paar dagen)
      if (recentePlanningIds.has(r.id)) s -= 6;

      // 6. Dieetwensen gezin: sterke straf als recept niet past bij iemand in het gezin
      if (alleDieetwensen.length > 0) {
        const receptNaam = r.naam.toLowerCase();
        for (const wens of alleDieetwensen) {
          const keywords = DIEET_KEYWORDS[wens] || [wens]; // fallback: gebruik de wens zelf als zoekwoord
          if (keywords.some(kw => receptNaam.includes(kw))) {
            s -= 12; // Harde straf: recept past niet bij gezinsprofiel
            break;
          }
        }
      }

      // 7. Willekeur: kleine toss om niet altijd exact dezelfde top te kiezen
      s += Math.random() * 0.8;

      return s;
    }

    // Bepaal of we een 2-daags recept inplannen
    // Regel: max 1 tweedaags per week, en alleen als het duidelijk de beste keuze is
    let meerdaagsGebruikt = false;
    // Plan alleen de geselecteerde aankomende dagen (gesorteerd op datum)
    const dagSlots = [...selectedAankomend].sort().map(key => ({ key, label: dagNaamVol(key) }));
    const nieuweP = { ...planning };
    const gebruikteCats = [];
    const gebruikteIds = new Set();
    const gekozenRecepten = []; // voor uitleg

    // ── Personen-gemiddelde over geselecteerde dagen ──
    const gemiddeldPersonen = dagSlots.reduce((s, d) => s + ((planning[d.key]?.personen) || 4), 0) / Math.max(1, dagSlots.length);
    // Bij 2 pers: ~25% kans; bij 4 pers: ~45%; bij 6+ pers: ~65% (max)
    const meerdaagsKans = Math.min(0.65, 0.15 + gemiddeldPersonen * 0.08);
    const magMeerdaagsDezweWeek = Math.random() < meerdaagsKans;

    let i = 0;

    while (i < dagSlots.length) {
      const resterend = dagSlots.length - i;

      // Basisfilter: niet al gebruikt, geen BBQ/Kerst, niet recent gemaakt
      const basisKandidaten = recepten.filter(r => {
        if (gebruikteIds.has(r.id)) return false;
        if (r.tags.includes("BBQ") || r.tags.includes("Kerst")) return false;
        if (recentGemaakt(r)) return false;
        return true;
      });

      // Als te weinig kandidaten na recency filter, versoepel
      const kandidaten = basisKandidaten.length >= 2 ? basisKandidaten : recepten.filter(r => {
        if (gebruikteIds.has(r.id)) return false;
        if (r.tags.includes("BBQ") || r.tags.includes("Kerst")) return false;
        return true;
      });

      const eendaags  = kandidaten.filter(r => r.dagen < 2);
      const meerdaags = kandidaten.filter(r => r.dagen >= 2);

      // 2-daags alleen overwegen als:
      // - het muntstuk dit week "meerdaags" zegt
      // - nog geen 2-daags gebruikt deze week
      // - er ≥2 slots over zijn
      // - er daarna nog genoeg eendaagse overblijven
      // - het 2-daagse recept significant beter scoort dan het beste eendaagse (drempel: +2 pts)
      let pool = eendaags;
      if (magMeerdaagsDezweWeek && !meerdaagsGebruikt && resterend >= 2 && meerdaags.length > 0) {
        const kandidatenNa = kandidaten.filter(r => r.dagen < 2);
        if (kandidatenNa.length >= resterend - 2) {
          const topMeerdaags = [...meerdaags].sort((a,b) => score(b,gebruikteCats) - score(a,gebruikteCats))[0];
          const topEendaags  = eendaags.length ? [...eendaags].sort((a,b) => score(b,gebruikteCats) - score(a,gebruikteCats))[0] : null;
          // 2-daags wint als het beter scoort; drempel lager bij meer personen (méér mensen = lager de balk)
          const meerdaagsDropempel = Math.max(0.5, 2.5 - (gemiddeldPersonen - 2) * 0.4);
          const scoreMeerdaags = score(topMeerdaags, gebruikteCats);
          const scoreEendaags  = topEendaags ? score(topEendaags, gebruikteCats) : -99;
          if (scoreMeerdaags > scoreEendaags + meerdaagsDropempel) {
            pool = meerdaags;
          }
        }
      }

      const gesorteerd = [...pool].sort((a,b) => score(b,gebruikteCats) - score(a,gebruikteCats));
      const keuze = gesorteerd[0];

      if (keuze) {
        gebruikteIds.add(keuze.id);
        gebruikteCats.push(getCat(keuze.naam));
        const isRecentVersoepeld = basisKandidaten.length < 2 && recentGemaakt(keuze);

        const dagDefaults = (key) => planning[key] || { thuiswerk: false, personen: 4, recept: null };
        if (!meerdaagsGebruikt && keuze.dagen >= 2 && resterend >= 2) {
          meerdaagsGebruikt = true;
          nieuweP[dagSlots[i].key]     = { ...dagDefaults(dagSlots[i].key),   recept: keuze };
          nieuweP[dagSlots[i+1].key]   = { ...dagDefaults(dagSlots[i+1].key), recept: keuze };
          gekozenRecepten.push({ recept: keuze, dagen: [dagSlots[i].label, dagSlots[i+1].label], recentVersoepeld: isRecentVersoepeld });
          i += 2;
        } else {
          nieuweP[dagSlots[i].key] = { ...dagDefaults(dagSlots[i].key), recept: keuze };
          gekozenRecepten.push({ recept: keuze, dagen: [dagSlots[i].label], recentVersoepeld: isRecentVersoepeld });
          i += 1;
        }
      } else {
        i += 1;
      }
    }

    setPlanning(nieuweP);

    // Sla geplande maaltijden op in geschiedenis (sleutel is al ISO-datum)
    dagSlots.forEach(d => {
      const r = nieuweP[d.key]?.recept;
      if (r) {
        const weerDag = weer.find(w => weerDagKort(d.key) === w.naam);
        slaOpInGeschiedenis(d.key, r.naam, weerDag?.icon || null, weerDag?.temp || null);
      }
    });

    // ── Bouw enthousiaste uitleg op ──────────────────────────────────────────
    const uitlegRegels = [];

    // Intro: seizoen + weer
    const seizoenEmoji = { lente: "🌱", zomer: "☀️", herfst: "🍂", winter: "❄️" };
    const seizoenLabel = huidigSeizoen.charAt(0).toUpperCase() + huidigSeizoen.slice(1);

    if (weerType) {
      const weerZin = weerType === "koud"
        ? `Brrr, koude week in Eindhoven (${gemiddeldTemp}°)! Perfect moment voor een echte stamppot of stevige stoof aan tafel.`
        : weerType === "fris"
        ? `Fris buiten in Eindhoven (${gemiddeldTemp}°) — precies het moment voor wat troostfood dat de hele avond lekker ruikt.`
        : weerType === "lekker"
        ? `Aangenaam weer in Eindhoven (${gemiddeldTemp}°) — een mooie mix van licht en stevig past perfect bij deze week.`
        : `Zomerse temperaturen in Eindhoven (${gemiddeldTemp}°)! Tijd voor kleurrijke, frisse maaltijden zonder al te lang te staan koken.`;
      uitlegRegels.push(`${seizoenEmoji[huidigSeizoen] || "🍴"} ${weerZin}`);
      if (regenDagen >= 3) uitlegRegels.push(`   🌧 ${regenDagen} regendagen verwacht — een warme soep of stoof staat er zeker in!`);
      else if (regenDagen >= 1) uitlegRegels.push(`   🌦 Af en toe een bui — lekker excuus om iets warms op het menu te zetten.`);
    } else {
      uitlegRegels.push(`${seizoenEmoji[huidigSeizoen] || "🍴"} We zitten midden in de ${seizoenLabel.toLowerCase()} — de planning is daarop afgestemd!`);
    }

    // Recente recepten overlap
    if (recentePlanningIds.size > 0) {
      uitlegRegels.push(`🔄 Recepten van de afgelopen dagen zijn bewust vermeden.`);
    }

    // Voorraad
    const alleIngr = [...pdfIngredienten, ...handmatigIngr];
    if (alleIngr.length > 0) {
      uitlegRegels.push(`📦 Voorraad meegenomen (${alleIngr.length} ingrediënten): ${alleIngr.slice(0,8).join(", ")}${alleIngr.length > 8 ? ` en ${alleIngr.length-8} anderen` : ""}.`);
    } else if (uploadNaam) {
      uitlegRegels.push(`📦 AH factuur (${uploadNaam}) geüpload — geen herkende ingrediënten gevonden.`);
    }

    // Per recept
    uitlegRegels.push("");
    uitlegRegels.push("Dit eten jullie deze week:");

    const dagEmoji = { "Maandag": "1️⃣", "Dinsdag": "2️⃣", "Woensdag": "3️⃣", "Donderdag": "4️⃣" };
    gekozenRecepten.forEach(({ recept: r, dagen, recentVersoepeld }) => {
      const dagStr = dagen.map(d => `${dagEmoji[d] || "•"} ${d}`).join(" + ");
      const sterren = r.rating > 0 ? " " + "★".repeat(r.rating) : "";
      const seizoenArr = Array.isArray(r.seizoen) ? r.seizoen : r.seizoen ? [r.seizoen] : [];
      const seizoenTip = seizoenArr.includes(huidigSeizoen) ? ` — perfect voor de ${huidigSeizoen}!` : "";
      const versoepeld = recentVersoepeld ? " ⚠️ (recent gemaakt, weinig alternatieven)" : "";
      const dagAantal = dagen.length > 1 ? ` (2 dagen)` : "";
      uitlegRegels.push(`${dagStr}${dagAantal}: ${r.naam}${sterren}${seizoenTip}${versoepeld}`);
    });

    // Afsluiter
    const uniekeCategorieen = [...new Set(gekozenRecepten.map(g => getCat(g.recept.naam)))];
    uitlegRegels.push("");
    uitlegRegels.push(`✨ Lekker gevarieerd: ${uniekeCategorieen.join(", ")}. Eet smakelijk! 🥦`);

    setAiResultaat(uitlegRegels.join("\n"));
  };

  const deelWeekAlsPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    const W = 210; const H = 297;
    const GROEN  = [44,  74,  46];
    const GROEN2 = [74, 122,  78];
    const ZAND   = [245,240,232];
    const ZANDD  = [232,222,200];
    const WIT    = [255,255,255];
    const TEKST  = [30, 46, 30];
    const GRIJS  = [122,138,122];

    // ── Achtergrond ──
    doc.setFillColor(...ZAND);
    doc.rect(0, 0, W, H, "F");

    // ── Header balk ──
    doc.setFillColor(...GROEN);
    doc.rect(0, 0, W, 38, "F");

    // Logo tekst
    doc.setTextColor(255,255,255);
    doc.setFont("helvetica","bold");
    doc.setFontSize(20);
    doc.text("Tafel & Week", 14, 15);
    doc.setFont("helvetica","normal");
    doc.setFontSize(8);
    doc.setTextColor(138,176,140);
    doc.text("WEEKMENU", 14, 21);

    // Datumbereik van de geplande dagen in header
    const pdfDagen = [...selectedAankomend].sort().filter(k => planning[k]?.recept);
    const pdfDatumRange = pdfDagen.length > 0
      ? `${formatDDMM(pdfDagen[0])} – ${formatDDMM(pdfDagen[pdfDagen.length-1])}`
      : formatDDMM(vandaagISO());
    doc.setTextColor(255,255,255);
    doc.setFontSize(11);
    doc.setFont("helvetica","normal");
    doc.text(pdfDatumRange, W - 14, 15, { align: "right" });

    // Weer samenvatting in header
    const weerStr = weer.slice(1,5).map(w => `${w.naam} ${w.icon} ${w.temp}°`).join("   ");
    doc.setFontSize(8);
    doc.setTextColor(200,230,200);
    doc.text(weerStr, W/2, 26, { align: "center" });

    // Subtitel
    doc.setTextColor(200,230,200);
    doc.setFontSize(8.5);
    doc.text("Avondeten voor het hele gezin", W/2, 33, { align: "center" });

    // ── Dag kaarten ──
    const dagH = 52;
    const dagPad = 6;
    const startY = 46;
    const NIET_VEGA_WDS = ["zalm","tonijn","kabeljauw","garnalen","makreel","sardines"];

    // Gebruik geplande aankomende dagen voor PDF
    const pdfDagenKeys = [...selectedAankomend].sort().filter(k => planning[k]?.recept);
    pdfDagenKeys.forEach((key, idx) => {
      const d = { key, label: (relatieveLabel(key) || dagNaamVol(key)) };
      const p = planning[key] || { thuiswerk: false, personen: 4, recept: null };
      const r = p.recept;
      const y = startY + idx * (dagH + dagPad);
      const nextKey = pdfDagenKeys[idx + 1];
      const prevKey = pdfDagenKeys[idx - 1];
      const isTweedaags = !!(r && nextKey && planning[nextKey]?.recept?.id === r.id);
      const isTweede    = !!(r && prevKey && planning[prevKey]?.recept?.id === r.id);

      // Kaart achtergrond
      doc.setFillColor(...WIT);
      doc.roundedRect(12, y, W - 24, dagH, 4, 4, "F");

      // Gekleurde linkerkant
      const accentKleur = r ? (isTweedaags || isTweede ? GROEN2 : GROEN) : [200,212,200];
      doc.setFillColor(...accentKleur);
      doc.roundedRect(12, y, 4, dagH, 2, 2, "F");
      doc.setFillColor(...accentKleur);
      doc.rect(14, y, 2, dagH, "F"); // flush rechterkant accent

      // Dag naam + datum
      doc.setFont("helvetica","bold");
      doc.setFontSize(11);
      doc.setTextColor(...GROEN);
      doc.text(d.label, 22, y + 10);

      doc.setFont("helvetica","normal");
      doc.setFontSize(9);
      doc.setTextColor(...GRIJS);
      doc.text(formatDDMM(key), 22, y + 17);

      // Kooktijd badge
      const tijdTxt = p.thuiswerk ? "60 min" : "30 min";
      doc.setFillColor(...ZAND);
      doc.roundedRect(W - 48, y + 6, 22, 8, 2, 2, "F");
      doc.setFontSize(7.5);
      doc.setTextColor(...GRIJS);
      doc.text(tijdTxt, W - 37, y + 11.5, { align: "center" });

      // Personen
      doc.setFontSize(7.5);
      doc.text(`${p.personen} pers.`, W - 22, y + 11.5, { align: "right" });

      if (r) {
        // Scheidingslijn
        doc.setDrawColor(...ZANDD);
        doc.setLineWidth(0.3);
        doc.line(22, y + 22, W - 14, y + 22);

        // Receptnaam
        doc.setFont("helvetica","bold");
        doc.setFontSize(12);
        doc.setTextColor(...TEKST);
        const naamTxt = r.naam.length > 48 ? r.naam.substring(0,46)+"…" : r.naam;
        doc.text(naamTxt, 22, y + 31);

        // Nick
        if (r.nick) {
          doc.setFont("helvetica","italic");
          doc.setFontSize(8.5);
          doc.setTextColor(...GRIJS);
          doc.text(r.nick, 22, y + 37);
        }

        // Rating sterren
        if (r.rating > 0) {
          doc.setFontSize(10);
          doc.setTextColor(180, 140, 20);
          doc.text("★".repeat(r.rating) + "☆".repeat(5 - r.rating), 22, y + 44);
        }

        // Seizoen tags
        const seizArr = Array.isArray(r.seizoen) ? r.seizoen : r.seizoen ? [r.seizoen] : [];
        let tagX = r.rating > 0 ? 22 + (r.rating > 0 ? 28 : 0) : 22;
        seizArr.slice(0,2).forEach(s => {
          doc.setFillColor(232,245,232);
          doc.roundedRect(tagX, y + 39, s.length * 2.8 + 6, 7, 1.5, 1.5, "F");
          doc.setFontSize(7);
          doc.setTextColor(74,122,78);
          doc.text(s, tagX + 3, y + 44);
          tagX += s.length * 2.8 + 10;
        });

        // Vis badge
        const isVis = NIET_VEGA_WDS.some(w => r.naam.toLowerCase().includes(w));
        if (isVis) {
          doc.setFillColor(230,240,255);
          doc.roundedRect(tagX, y + 39, 16, 7, 1.5, 1.5, "F");
          doc.setFontSize(7);
          doc.setTextColor(30,80,160);
          doc.text("vis", tagX + 3, y + 44);
          tagX += 20;
        }

        // Favoriet hartje
        if (r.favoriet) {
          doc.setFontSize(11);
          doc.setTextColor(...GROEN);
          doc.text("♥", W - 22, y + 31);
        }

        // 2-daags badge
        if (isTweedaags) {
          doc.setFillColor(...GROEN);
          doc.roundedRect(W - 50, y + 37, 18, 7, 1.5, 1.5, "F");
          doc.setFontSize(7);
          doc.setTextColor(255,255,255);
          doc.text("2 dagen", W - 41, y + 42, { align: "center" });
        }
        if (isTweede) {
          doc.setFillColor(...GROEN2);
          doc.roundedRect(W - 50, y + 37, 18, 7, 1.5, 1.5, "F");
          doc.setFontSize(7);
          doc.setTextColor(255,255,255);
          doc.text("dag 2/2", W - 41, y + 42, { align: "center" });
        }

      } else {
        // Geen recept ingepland
        doc.setFont("helvetica","italic");
        doc.setFontSize(10);
        doc.setTextColor(...GRIJS);
        doc.text("— nog niet ingepland —", 22, y + 35);
      }
    });

    // ── Footer ──
    const footerY = startY + 4 * (dagH + dagPad) + 4;
    doc.setDrawColor(...ZANDD);
    doc.setLineWidth(0.4);
    doc.line(14, footerY, W - 14, footerY);

    doc.setFont("helvetica","normal");
    doc.setFontSize(8);
    doc.setTextColor(...GRIJS);
    const vandaag = new Date();
    const datum = `${String(vandaag.getDate()).padStart(2,"0")}/${String(vandaag.getMonth()+1).padStart(2,"0")}/${vandaag.getFullYear()}`;
    doc.text(`Gegenereerd op ${datum} · Tafel & Week Maaltijdplanner · Vegetarisch gezin · Eindhoven`, W/2, footerY + 6, { align: "center" });

    // ── Opslaan ──
    const fnVan = pdfDagen.length > 0 ? pdfDagen[0].replace(/-/g, "") : vandaagISO().replace(/-/g, "");
    const fnTm  = pdfDagen.length > 0 ? pdfDagen[pdfDagen.length-1].replace(/-/g, "") : fnVan;
    doc.save(`weekmenu_${fnVan}_tm_${fnTm}.pdf`);
  };

  return (
    <div style={{ padding: mobile ? 16 : 24, maxWidth: 860 }}>
      <div style={{ fontFamily: "Georgia,serif", fontSize: mobile ? 20 : 24, color: G.groen, marginBottom: 4 }}>Maaltijdplanner</div>
      <div style={{ fontSize: mobile ? 14 : 12.5, color: G.tekstMid, marginBottom: 20 }}>Plan je avondmaaltijden — flexibel per dag</div>

      {/* Aankomende dagen selectie */}
      <div style={{ background: G.kaart, borderRadius: 12, border: `1px solid ${G.zandMid}`, padding: mobile ? "14px 16px" : "16px 20px", marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 500, color: G.groenMid, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 12 }}>Welke dagen wil je plannen?</div>
        <div style={{ display: "flex", gap: mobile ? 8 : 10, flexWrap: "wrap", alignItems: "center" }}>
          {Array.from({length:aankomendAantal}, (_,i) => datumOffset(i)).map(key => {
            const aan = selectedAankomend.has(key);
            const rel = relatieveLabel(key);
            const heeftRecept = !!planning[key]?.recept;
            return (
              <button key={key} onClick={() => {
                const ns = new Set(selectedAankomend);
                if (aan) ns.delete(key); else ns.add(key);
                setSelectedAankomend(ns);
              }} style={{
                padding: mobile ? "10px 14px" : "8px 12px",
                borderRadius: 10,
                border: `2px solid ${aan ? G.groen : G.zandMid}`,
                background: aan ? G.groenPale : G.zand,
                color: aan ? G.groen : G.tekstMid,
                cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                position: "relative",
                minWidth: mobile ? 72 : 68,
              }}>
                <span style={{ fontSize: mobile ? 12 : 11, fontWeight: 600 }}>{rel || dagNaamVol(key).slice(0,2)}</span>
                <span style={{ fontSize: 10.5, color: aan ? G.groenMid : G.tekstZacht }}>{formatDDMM(key)}</span>
                {heeftRecept && <span style={{ position: "absolute", top: 4, right: 4, width: 7, height: 7, borderRadius: "50%", background: G.groen }} />}
              </button>
            );
          })}
          {/* + knop: voeg volgende dag toe */}
          {aankomendAantal < 14 && (
            <button onClick={() => {
              const volgendeKey = datumOffset(aankomendAantal);
              setAankomendAantal(n => n + 1);
              setSelectedAankomend(ns => new Set([...ns, volgendeKey]));
            }} title={`Voeg ${dagNaamVol(datumOffset(aankomendAantal))} toe`} style={{
              width: mobile ? 48 : 44, height: mobile ? 48 : 44,
              borderRadius: 10,
              border: `2px dashed ${G.zandMid}`,
              background: G.zand,
              color: G.tekstZacht,
              cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 1,
              fontSize: 18, fontWeight: 300,
            }}>
              +
              <span style={{ fontSize: 9, color: G.tekstZacht }}>{formatDDMM(datumOffset(aankomendAantal))}</span>
            </button>
          )}
        </div>
        <div style={{ fontSize: 11, color: G.tekstZacht, marginTop: 10 }}>
          {selectedAankomend.size === 0 ? "Selecteer minimaal één dag" : `${selectedAankomend.size} dag${selectedAankomend.size > 1 ? "en" : ""} geselecteerd`}
        </div>
      </div>

      {/* Voorraad */}
      <div style={{ background: G.kaart, borderRadius: 12, border: `1px solid ${G.zandMid}`, padding: "18px 20px", marginBottom: 14 }}>
        <div style={{ fontFamily: "Georgia,serif", fontSize: 14, color: G.groen, marginBottom: 14 }}>Wat heb ik nog in huis?</div>

        {/* Handmatige invoer — primair */}
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 10, fontWeight: 500, textTransform: "uppercase", letterSpacing: ".06em", color: G.groenMid, marginBottom: 5 }}>Zelf toevoegen</div>
          <div style={{ fontSize: 11, color: G.tekstZacht, marginBottom: 8 }}>Ingrediënten van een andere winkel, of die je al in huis hebt.</div>
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            <input
              value={handmatigInput}
              onChange={e => setHandmatigInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && voegHandmatigToe()}
              placeholder="bijv. rijst, kikkererwten, kokosmelk"
              style={{ flex: 1, border: `1px solid ${G.zandMid}`, borderRadius: 8, padding: mobile ? "12px 14px" : "7px 10px", color: G.tekst, background: G.zand, outline: "none", fontFamily: "inherit" }}
            />
            <button onClick={voegHandmatigToe} style={{ padding: mobile ? "12px 18px" : "7px 14px", background: G.groen, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: mobile ? 18 : 12.5, fontWeight: 500 }}>+</button>
          </div>
          {handmatigIngr.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
              {handmatigIngr.map(ingr => (
                <span key={ingr} onClick={() => verwijderHandmatig(ingr)} style={{ fontSize: mobile ? 14 : 11, padding: mobile ? "8px 12px" : "2px 8px", background: G.zandMid, color: G.zandDeep, borderRadius: 20, cursor: "pointer", border: `1px solid ${G.zandDonker}`, display: "flex", alignItems: "center", gap: 4 }}>
                  {ingr} <span style={{ fontSize: mobile ? 14 : 10, padding: mobile ? "2px 2px" : "0", opacity: 0.6, lineHeight: 1 }}>✕</span>
                </span>
              ))}
            </div>
          )}
        </div>

        {/* AH Factuur — secundair, inklapbaar */}
        <div style={{ borderTop: `1px solid ${G.zandMid}`, paddingTop: 12 }}>
          <button
            onClick={() => setFactuurTab(factuurTab === null ? "plak" : null)}
            style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", cursor: "pointer", padding: 0, color: G.tekstMid, fontSize: mobile ? 13 : 11.5 }}
          >
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{ transform: factuurTab !== null ? "rotate(90deg)" : "none", transition: "transform .15s" }}><polyline points="9 18 15 12 9 6"/></svg>
            Inladen vanuit AH factuur
          </button>

          {factuurTab !== null && (
            <div style={{ marginTop: 10 }}>
              {/* Tab knoppen */}
              <div style={{ display: "flex", gap: 4, marginBottom: 10, background: G.zand, borderRadius: 8, padding: 3 }}>
                {[["plak", "📋 Plak tekst"], ["upload", "📄 Upload PDF"]].map(([key, label]) => (
                  <button key={key} onClick={() => setFactuurTab(key)} style={{ flex: 1, padding: mobile ? "10px 8px" : "5px 8px", borderRadius: 6, border: "none", background: factuurTab === key ? G.kaart : "transparent", color: factuurTab === key ? G.groen : G.tekstZacht, fontSize: mobile ? 14 : 12, cursor: "pointer", fontWeight: factuurTab === key ? 500 : 400, boxShadow: factuurTab === key ? "0 1px 3px rgba(0,0,0,.07)" : "none", transition: "all .12s" }}>
                    {label}
                  </button>
                ))}
              </div>

              {/* Tab: Plak tekst */}
              {factuurTab === "plak" && (
                <div>
                  <div style={{ fontSize: 11, color: G.tekstZacht, marginBottom: 7 }}>
                    Open je AH factuur, selecteer alles (Ctrl+A), kopieer (Ctrl+C) en plak hier:
                  </div>
                  <textarea
                    value={plakTekst}
                    onChange={e => { setPlakTekst(e.target.value); setPlakStatus(""); }}
                    placeholder="Plak hier de tekst van je AH factuur of bonnetje..."
                    style={{ width: "100%", border: `1px solid ${G.zandMid}`, borderRadius: 8, padding: "8px 10px", fontSize: 12, color: G.tekst, background: G.zand, outline: "none", fontFamily: "inherit", resize: "vertical", minHeight: 90, lineHeight: 1.5 }}
                  />
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 7 }}>
                    <div style={{ fontSize: 11, color: G.tekstZacht }}>
                      {plakStatus === "ok" && <span style={{ color: G.groenMid }}>✓ Ingrediënten herkend en toegevoegd</span>}
                      {plakStatus === "laden" && <span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ display: "inline-block", width: 11, height: 11, border: `2px solid ${G.groenZacht}`, borderTopColor: G.groen, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> Verwerken...</span>}
                      {!plakStatus && plakTekst && <span>{plakTekst.length} tekens</span>}
                    </div>
                    <button onClick={verwerkPlakTekst} disabled={!plakTekst.trim() || plakStatus === "laden"} style={{ padding: mobile ? "12px 18px" : "6px 14px", background: plakTekst.trim() ? G.groen : G.groenLicht, color: "#fff", border: "none", borderRadius: 7, cursor: plakTekst.trim() ? "pointer" : "not-allowed", fontSize: mobile ? 15 : 12 }}>
                      Herken ingrediënten
                    </button>
                  </div>
                </div>
              )}

              {/* Tab: PDF upload */}
              {factuurTab === "upload" && (
                <div>
                  <label style={{ display: "flex", alignItems: "center", gap: 10, border: `1.5px dashed ${uploadNaam ? G.groenLicht : G.zandDonker}`, borderRadius: 9, padding: "12px 14px", cursor: "pointer", background: uploadNaam ? G.groenPale : G.zand, transition: "all .15s" }}>
                    <div style={{ width: 28, height: 28, background: uploadNaam ? G.groenZacht : G.zandMid, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {uploadNaam
                        ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={G.groen} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={G.zandDeep} strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                      }
                    </div>
                    <div>
                      <div style={{ fontSize: 12.5, color: uploadNaam ? G.groen : G.tekstMid, fontWeight: uploadNaam ? 500 : 400 }}>
                        {uploadNaam ? uploadNaam : "Upload AH factuur (PDF)"}
                      </div>
                      <div style={{ fontSize: 10.5, color: G.tekstZacht, marginTop: 2 }}>
                        {uploadNaam
                          ? pdfStatus === "laden" ? "Bezig met uitlezen..."
                          : pdfStatus === "ok" ? `${pdfIngredienten.length} ingrediënten herkend`
                          : pdfStatus === "leeg" ? "Geen ingrediënten gevonden"
                          : pdfStatus === "fout" ? "Uitlezen mislukt — probeer Plak tekst"
                          : "Verwerken..."
                          : "Vereist een Anthropic API key (zie sidebar)"}
                      </div>
                    </div>
                    <input type="file" accept=".pdf" style={{ display: "none" }} onChange={handlePDFChange} />
                  </label>
                  {pdfStatus === "geen-key" && (
                    <div style={{ marginTop: 8, fontSize: 11.5, color: "#7A4F00", background: "#FFF8E6", border: "1px solid #E8C96A", borderRadius: 7, padding: "7px 10px" }}>
                      Geen API key ingesteld. Gebruik de tab "Plak tekst" — dat werkt altijd zonder API key.
                    </div>
                  )}
                  {pdfStatus === "laden" && (
                    <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: G.groenMid }}>
                      <span style={{ display: "inline-block", width: 14, height: 14, border: `2px solid ${G.groenZacht}`, borderTopColor: G.groen, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
                      Claude leest je factuur uit...
                    </div>
                  )}
                  {pdfStatus === "fout" && (
                    <div style={{ marginTop: 8, fontSize: 11.5, color: "#B03030", background: "#FEF0F0", border: "1px solid #F5C0C0", borderRadius: 7, padding: "7px 10px" }}>
                      Kon de PDF niet uitlezen. Probeer de tab "Plak tekst".
                    </div>
                  )}
                </div>
              )}

              {/* Herkende ingrediënten (beide tabs) */}
              {pdfIngredienten.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 10, color: G.tekstZacht, marginBottom: 6 }}>Herkend uit factuur ({pdfIngredienten.length}) — klik om te verwijderen:</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {pdfIngredienten.map(ingr => (
                      <span key={ingr} onClick={() => verwijderPdf(ingr)} style={{ fontSize: mobile ? 14 : 11, padding: mobile ? "8px 12px" : "2px 8px", background: "#E8F4E8", color: G.groenMid, borderRadius: 20, cursor: "pointer", border: `1px solid ${G.groenZacht}`, display: "flex", alignItems: "center", gap: 4 }}>
                        {ingr} <span style={{ fontSize: mobile ? 14 : 10, padding: mobile ? "2px 2px" : "0", opacity: 0.6, lineHeight: 1 }}>✕</span>
                      </span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Acties */}
      <div style={{ display: "flex", gap: mobile ? 10 : 8, marginBottom: 18, flexWrap: "wrap" }}>
        <button onClick={planWeek} disabled={selectedAankomend.size === 0} style={{ flex: mobile ? 1 : "unset", padding: mobile ? "13px 16px" : "8px 16px", background: selectedAankomend.size > 0 ? G.groen : G.groenLicht, color: "#fff", border: "none", borderRadius: 10, fontSize: mobile ? 15 : 12.5, cursor: selectedAankomend.size > 0 ? "pointer" : "not-allowed", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontWeight: 500 }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Plan selectie
        </button>
        <button onClick={() => {
          const reset = { ...planning };
          selectedAankomend.forEach(key => { if (reset[key]) reset[key] = { ...reset[key], recept: null }; });
          setPlanning(reset);
        }} style={{ flex: mobile ? 1 : "unset", padding: mobile ? "13px 16px" : "8px 16px", background: G.kaart, color: G.tekstMid, border: `1px solid ${G.zandMid}`, borderRadius: 10, fontSize: mobile ? 15 : 12.5, cursor: "pointer" }}>
          Reset selectie
        </button>
        {!mobile && (
          <button onClick={deelWeekAlsPDF} style={{ padding: "8px 16px", background: G.kaart, color: G.groen, border: `1px solid ${G.groenLicht}`, borderRadius: 8, fontSize: 12.5, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            Deel als PDF
          </button>
        )}
      </div>

      {/* Weer */}
      {aiResultaat && (
        <div style={{ background: G.groenPale, border: `1px solid ${G.groenZacht}`, borderRadius: 10, padding: "14px 16px", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 9 }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={G.groen} strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <div style={{ fontSize: 10, fontWeight: 500, color: G.groen, textTransform: "uppercase", letterSpacing: ".06em" }}>Planning uitleg</div>
          </div>
          <div style={{ fontSize: 12.5, color: G.tekstMid, lineHeight: 1.75, whiteSpace: "pre-wrap", fontFamily: "inherit" }}>{aiResultaat}</div>
        </div>
      )}

      {/* Weer */}
      {weer.length > 0 && (
        <div style={{ background: G.kaart, borderRadius: 10, border: `1px solid ${G.zandMid}`, padding: "10px 16px", marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={G.groenMid} strokeWidth="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
              <span style={{ fontSize: 11, fontWeight: 500, color: G.groenMid }}>Eindhoven</span>
            </div>
            <span style={{ fontSize: 10, color: G.tekstZacht }}>komende 7 dagen</span>
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            {weer.map((w, i) => (
              <div key={i} style={{ fontSize: 11.5, color: G.tekstMid, display: "flex", alignItems: "center", gap: 3 }}>
                {w.naam} {w.icon} <strong style={{ color: G.tekst }}>{w.temp}°</strong>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Dag grid — gisteren + vandaag + komende 6 dagen (altijd 8 vaste dagen) */}
      {(() => {
        const vandaag = vandaagISO();
        const zichtbareKeys = Array.from({length: 8}, (_, i) => datumOffset(i - 1)); // gisteren t/m dag+6
        if (zichtbareKeys.length === 0) return (
          <div style={{ background: G.kaart, border: `1px dashed ${G.zandMid}`, borderRadius: 12, padding: 32, textAlign: "center", color: G.tekstZacht, fontSize: 13 }}>
            Selecteer aankomende dagen om te plannen
          </div>
        );
        return (
      <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: mobile ? 10 : 12 }}>
        {zichtbareKeys.map((key, idx) => {
          const isVerleden = key < vandaag;
          const isVandaag = key === vandaag;
          const p = planning[key] || { thuiswerk: false, personen: 4, recept: null };
          const r = p.recept;
          const prevKey = zichtbareKeys[idx - 1];
          const nextKey = zichtbareKeys[idx + 1];
          const d = { key, label: (relatieveLabel(key) || dagNaamVol(key)) + " " + formatDDMM(key) };
          // Detecteer 2-daags
          const prevR = prevKey ? planning[prevKey]?.recept : null;
          const nextR = nextKey ? planning[nextKey]?.recept : null;
          const isEersteDag = r && nextR && nextR.id === r.id;
          const isTweedeDag = r && prevR && prevR.id === r.id;
          const isTweedaags = isEersteDag || isTweedeDag;
          const dagNr = isEersteDag ? 1 : isTweedeDag ? 2 : null;
          const relLabel = relatieveLabel(key);
          const dagTitel = relLabel || dagNaamVol(key);

          return (
            <div key={key} style={{
              background: G.kaart, borderRadius: 12,
              border: isVandaag ? `2px solid ${G.groen}` : isTweedaags ? `2px solid ${G.groenLicht}` : `1px solid ${G.zandMid}`,
              overflow: "hidden",
              boxShadow: isVandaag ? `0 0 0 3px ${G.groenPale}` : isTweedaags ? `0 0 0 3px ${G.groenPale}` : "none",
              opacity: isVerleden ? 0.88 : 1,
            }}>
              <div style={{ background: isVandaag ? G.groen : isVerleden ? G.zandMid : (isTweedaags ? G.groenZacht : G.groenPale), borderBottom: `1px solid ${isVandaag ? G.groenMid : isVerleden ? G.zandDonker : G.groenZacht}`, padding: mobile ? "13px 16px" : "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  {isVerleden && <span style={{ fontSize: 9.5, padding: "1px 6px", borderRadius: 20, background: G.zandDeep, color: "#fff", fontWeight: 600 }}>Gisteren</span>}
                  {isVandaag && <span style={{ fontSize: 9.5, padding: "1px 6px", borderRadius: 20, background: "rgba(255,255,255,.25)", color: "#fff", fontWeight: 600 }}>Vandaag</span>}
                  <span style={{ fontFamily: "Georgia,serif", fontSize: mobile ? 17 : 14, color: isVandaag ? "#fff" : isVerleden ? G.tekstMid : G.groen }}>{dagTitel}</span>
                  <span style={{ fontSize: mobile ? 13 : 11, color: isVandaag ? "rgba(255,255,255,.75)" : G.tekstZacht }}>{formatDDMM(key)}</span>
                  {isTweedaags && (
                    <span style={{ fontSize: 9.5, padding: "2px 7px", borderRadius: 20, fontWeight: 600, background: G.groen, color: "#fff", letterSpacing: ".02em" }}>
                      dag {dagNr} van 2
                    </span>
                  )}
                </div>
                {!isVerleden && <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 20, fontWeight: 500, background: isVandaag ? "rgba(255,255,255,.2)" : p.thuiswerk ? G.groenZacht : G.zandMid, color: isVandaag ? "#fff" : p.thuiswerk ? G.groen : G.zandDeep }}>
                  {p.thuiswerk ? "60 min" : "30 min"}
                </span>}
              </div>
              <div style={{ padding: mobile ? "14px 16px" : "12px 14px" }}>
                {!isVerleden && <div style={{ display: "flex", gap: mobile ? 8 : 7, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
                  <select value={String(p.thuiswerk)} onChange={e => setPlanning({ ...planning, [key]: { ...p, thuiswerk: e.target.value === "true" } })} style={{ border: `1px solid ${G.zandMid}`, background: G.zand, borderRadius: 7, padding: "8px 10px", color: G.tekst, outline: "none", flex: mobile ? 1 : "unset" }}>
                    <option value="true">Thuis werk</option>
                    <option value="false">Op kantoor</option>
                  </select>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <button onClick={() => setPlanning({ ...planning, [key]: { ...p, personen: Math.max(1, p.personen - 1) } })} style={{ width: mobile ? 36 : 26, height: mobile ? 36 : 26, border: `1px solid ${G.zandMid}`, background: G.zand, borderRadius: 6, cursor: "pointer", fontSize: mobile ? 18 : 14, color: G.tekstMid, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>−</button>
                    <span style={{ minWidth: mobile ? 28 : 22, textAlign: "center", fontSize: mobile ? 15 : 12, fontWeight: 500, color: G.tekst }}>{p.personen}</span>
                    <button onClick={() => setPlanning({ ...planning, [key]: { ...p, personen: Math.min(8, p.personen + 1) } })} style={{ width: mobile ? 36 : 26, height: mobile ? 36 : 26, border: `1px solid ${G.zandMid}`, background: G.zand, borderRadius: 6, cursor: "pointer", fontSize: mobile ? 18 : 14, color: G.tekstMid, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>+</button>
                    <span style={{ fontSize: mobile ? 13 : 11, color: G.tekstZacht }}>pers.</span>
                  </div>
                </div>}
                <div onClick={() => r ? setDetailRecept(r) : setSelectDag({ key, label: `${dagTitel} ${formatDDMM(key)}` })} style={{ background: r ? (isTweedaags ? "#F0F9F0" : G.kaart) : G.groenPale, border: `1px ${r ? "solid" : "dashed"} ${r ? (isTweedaags ? G.groenLicht : G.zandMid) : G.groenZacht}`, borderRadius: 10, padding: mobile ? "14px 16px" : "10px 12px", cursor: "pointer", minHeight: mobile ? 80 : 70, display: "flex", flexDirection: "column", justifyContent: "center", gap: 6 }}>
                  {r ? (() => {
                    // Bereken "laatst gegeten"
                    const gd = r.gemaaktData && r.gemaaktData.length > 0 ? r.gemaaktData[0] : null;
                    const laastGegeten = gd ? (() => {
                      const diff = Math.round((Date.now() - new Date(gd).getTime()) / (1000*60*60*24));
                      return diff === 0 ? "vandaag" : diff === 1 ? "gisteren" : diff < 7 ? `${diff} dagen geleden` : diff < 14 ? "vorige week" : `${Math.round(diff/7)} weken geleden`;
                    })() : null;
                    const seizArr = Array.isArray(r.seizoen) ? r.seizoen : r.seizoen ? [r.seizoen] : [];
                    return (
                      <>
                        {/* Naam + favoriet hartje */}
                        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 6 }}>
                          <div style={{ fontSize: mobile ? 15 : 12.5, fontWeight: 500, color: G.tekst, lineHeight: 1.3, flex: 1 }}>{r.naam}</div>
                          {r.favoriet && (
                            <svg width="13" height="13" viewBox="0 0 24 24" fill={G.groen} stroke={G.groen} strokeWidth="2" style={{ flexShrink: 0, marginTop: 1 }}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                          )}
                        </div>
                        {/* Rating + 2-dagen badge */}
                        <div style={{ display: "flex", gap: 5, alignItems: "center", flexWrap: "wrap" }}>
                          {r.rating > 0 && <Sterren rating={r.rating} />}
                          {isTweedaags && (
                            <span style={{ fontSize: 9.5, color: G.groenMid, display: "flex", alignItems: "center", gap: 2 }}>
                              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                              2 dagen
                            </span>
                          )}
                        </div>
                        {/* Seizoen + laatste keer */}
                        <div style={{ display: "flex", gap: 5, alignItems: "center", flexWrap: "wrap" }}>
                          {seizArr.slice(0,2).map(s => (
                            <span key={s} style={{ fontSize: 9.5, padding: "1px 5px", background: "#E8F5E9", color: G.groenMid, borderRadius: 8 }}>{s}</span>
                          ))}
                          {laastGegeten && (
                            <span style={{ fontSize: 9.5, color: G.tekstZacht, display: "flex", alignItems: "center", gap: 2 }}>
                              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                              {laastGegeten}
                            </span>
                          )}
                        </div>
                      </>
                    );
                  })() : <div style={{ color: G.tekstZacht, fontSize: mobile ? 15 : 11.5, textAlign: "center" }}>+ Kies recept</div>}
                </div>
                {r && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 8 }}>
                    {/* Gemaakt vandaag knop — alleen op de dag van vandaag */}
                    {isVandaag && (() => {
                      const vandaagStr = vandaagISO();
                      const alGemaakt = (r.gemaaktData || []).some(d => d.startsWith(vandaagStr));
                      return (
                        <button onClick={(e) => {
                          e.stopPropagation();
                          if (alGemaakt) return;
                          const nu = new Date().toISOString();
                          const bijgewerkt = { ...r, gemaaktData: [nu, ...(r.gemaaktData || [])], laatstGemaakt: nu };
                          setRecepten(recepten.map(re => re.id === r.id ? bijgewerkt : re));
                          setPlanning({ ...planning, [key]: { ...p, recept: bijgewerkt } });
                        }} style={{ width: "100%", padding: mobile ? "13px" : "9px", background: alGemaakt ? G.groenZacht : G.groen, color: alGemaakt ? G.groenMid : "#fff", border: `1px solid ${alGemaakt ? G.groenLicht : G.groen}`, borderRadius: 8, fontSize: mobile ? 14 : 12, cursor: alGemaakt ? "default" : "pointer", fontWeight: 500, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                          {alGemaakt
                            ? <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg> Gemaakt vandaag!</>
                            : <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg> Gemaakt vandaag</>
                          }
                        </button>
                      );
                    })()}
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={(e) => { e.stopPropagation(); setSelectDag({ key, label: `${dagTitel} ${formatDDMM(key)}` }); }} style={{ flex: 1, padding: mobile ? "11px 8px" : "7px 8px", background: G.groenPale, color: G.groenMid, border: `1px solid ${G.groenZacht}`, borderRadius: 8, fontSize: mobile ? 13 : 11, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                        Wijzig
                      </button>
                      <button onClick={(e) => { e.stopPropagation(); setPlanning({ ...planning, [key]: { ...p, recept: null } }); }} style={{ flex: 1, padding: mobile ? "11px 8px" : "7px 8px", background: "#f0f0ea", color: G.tekstMid, border: `1px solid ${G.zandMid}`, borderRadius: 8, fontSize: mobile ? 13 : 11, cursor: "pointer" }}>
                        ✕ Verwijder
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
        );
      })()}

      {/* Vorige dagen — log of bewerk wat je eerder gegeten hebt */}
      {(() => {
        const verldenDagen = Array.from({length:6}, (_,i) => datumOffset(-(7-i))); // dag -7 t/m dag -2 (gisteren zit in het grid)
        const leegAantal = verldenDagen.filter(k => !planning[k]?.recept).length;
        return (
          <div style={{ marginTop: 18 }}>
            <button onClick={() => setVerldenOpen(v => !v)} style={{ display: "flex", alignItems: "center", gap: 7, background: "none", border: "none", cursor: "pointer", padding: "8px 0", color: G.tekstMid, fontSize: mobile ? 14 : 12.5, fontWeight: 500 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ transform: verldenOpen ? "rotate(90deg)" : "none", transition: "transform .15s" }}><polyline points="9 18 15 12 9 6"/></svg>
              Vorige dagen
              {leegAantal > 0 && <span style={{ fontSize: 10, padding: "1px 7px", borderRadius: 20, background: G.groenLicht, color: G.groen, fontWeight: 600 }}>{leegAantal} leeg</span>}
            </button>
            {verldenOpen && (
              <div style={{ background: G.kaart, borderRadius: 12, border: `1px solid ${G.zandMid}`, padding: mobile ? "14px 16px" : "16px 20px", marginTop: 6 }}>
                <div style={{ fontSize: 11.5, color: G.tekstZacht, marginBottom: 12 }}>Vul in of bewerk wat je gegeten hebt</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {verldenDagen.map(k => {
                    const rl = relatieveLabel(k);
                    const dagLabel = rl || dagNaamVol(k);
                    const r = planning[k]?.recept;
                    return (
                      <div key={k} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, padding: "10px 12px", background: r ? G.groenPale : G.zand, borderRadius: 9, border: `1px solid ${r ? G.groenZacht : G.zandMid}` }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                            <span style={{ fontWeight: 500, color: G.tekst, fontSize: 13 }}>{dagLabel}</span>
                            <span style={{ color: G.tekstZacht, fontSize: 12 }}>{formatDDMM(k)}</span>
                          </div>
                          {r && <div style={{ fontSize: 11.5, color: G.groenMid, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.naam}</div>}
                        </div>
                        <button onClick={() => setSelectDag({ key: k, label: `${dagLabel} ${formatDDMM(k)}` })} style={{ padding: "8px 14px", background: r ? G.groenMid : G.groen, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 500, flexShrink: 0 }}>
                          {r ? "Bewerken" : "Invullen"}
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {selectDag && (
        <SelectModal
          dagLabel={selectDag.label}
          recepten={recepten}
          mobile={mobile}
          onSelect={r => {
            const bestaand = planning[selectDag.key] || { thuiswerk: false, personen: 4, recept: null };
            setPlanning({ ...planning, [selectDag.key]: { ...bestaand, recept: r } });
            setSelectDag(null);
            setVerldenOpen(false);
          }}
          onClose={() => setSelectDag(null)}
        />
      )}

      {detailRecept && (
        <ReceptDetailModal
          recept={detailRecept}
          alleRecepten={recepten}
          mobile={mobile}
          onClose={() => setDetailRecept(null)}
          onSave={(updates) => {
            const bijgewerkt = { ...detailRecept, ...updates };
            setRecepten(recepten.map(r => r.id === detailRecept.id ? bijgewerkt : r));
            // Werk ook de planning bij zodat de tegel direct de nieuwe info toont
            const nieuwePlanning = {};
            for (const [k, v] of Object.entries(planning)) {
              nieuwePlanning[k] = { ...v, recept: v.recept?.id === detailRecept.id ? bijgewerkt : v.recept };
            }
            setPlanning(nieuwePlanning);
            setDetailRecept(null);
          }}
        />
      )}
    </div>
  );
}

// ─── RECEPT TOEVOEGEN MODAL ─────────────────────────────────────────────────
function ToevoegenModal({ onClose, onSave, volgendId }) {
  const [modus, setModus] = useState("link"); // "link" | "handmatig"
  const [link, setLink] = useState("");
  const [linkStatus, setLinkStatus] = useState(""); // "laden" | "ok" | "fout" | ""
  const [form, setForm] = useState({
    naam: "", nick: "", url: "", rating: 0, dagen: 0, notes: "", tags: []
  });
  const [nieuweTag, setNieuweTag] = useState("");
  const [hoverRating, setHoverRating] = useState(0);

  const verwerkLink = () => {
    const trimmed = link.trim();
    // Valideer AH allerhande URL
    const match = trimmed.match(/ah\.nl\/allerhande\/recept\/(R-R\d+)\/([^/?#]+)/);
    if (!match) {
      setLinkStatus("fout");
      return;
    }
    setLinkStatus("laden");
    const receptId = match[1];
    const slug = match[2];
    const naam = slug.replace(/-/g, " ").replace(/^./, c => c.toUpperCase());
    const imageUrl = `https://static.ah.nl/static/recepten/img_${receptId.replace("R-R","")}_300x300_FP.jpg`;
    const seizoen = toSeizoen(naam);
    setForm(f => ({ ...f, naam, url: trimmed, imageUrl, seizoen }));
    setLinkStatus("ok");
    setModus("handmatig");
  };

  const voegTagToe = (t) => {
    const val = (t || nieuweTag).trim();
    if (val && !form.tags.includes(val)) {
      setForm(f => ({ ...f, tags: [...f.tags, val] }));
      setNieuweTag("");
    }
  };

  const opslaan = () => {
    if (!form.naam.trim()) return;
    const nieuw = {
      id: volgendId,
      naam: form.naam.trim(),
      nick: form.nick.trim(),
      url: form.url.trim(),
      imageUrl: form.imageUrl || toImg(form.url.trim()),
      notes: form.notes.trim(),
      rating: form.rating,
      dagen: parseInt(form.dagen) || 0,
      tags: form.tags,
      seizoen: form.seizoen || toSeizoen(form.naam.trim()),
      gemaaktData: [],
      laatstGemaakt: null,
    };
    onSave(nieuw);
  };

  const labelStijl = { fontSize: 10, fontWeight: 500, textTransform: "uppercase", letterSpacing: ".06em", color: G.groenMid, marginBottom: 5, display: "block" };
  const inputStijl = { width: "100%", border: `1px solid ${G.zandMid}`, borderRadius: 8, padding: "7px 10px", fontSize: 12.5, color: G.tekst, background: G.zand, outline: "none", fontFamily: "inherit" };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(30,46,30,.55)", zIndex: 200, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", overflowY: "auto" }}>
      <div style={{ background: G.kaart, borderRadius: 12, width: "100%", maxWidth: 500, boxShadow: "0 8px 40px rgba(44,74,46,.18)" }}>
        {/* Header */}
        <div style={{ background: G.groen, padding: "18px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", borderRadius: "12px 12px 0 0" }}>
          <div style={{ fontFamily: "Georgia,serif", fontSize: 17, color: "#fff" }}>Recept toevoegen</div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,.15)", border: "none", color: "#fff", width: 26, height: 26, borderRadius: "50%", cursor: "pointer", fontSize: 14 }}>✕</button>
        </div>

        <div style={{ padding: "20px", maxHeight: "76vh", overflowY: "auto" }}>
          {/* Modus tabs */}
          <div style={{ display: "flex", gap: 6, marginBottom: 20, background: G.zand, borderRadius: 8, padding: 4 }}>
            {[["link", "Via AH link"], ["handmatig", "Handmatig"]].map(([key, label]) => (
              <button key={key} onClick={() => setModus(key)} style={{ flex: 1, padding: "6px 10px", borderRadius: 6, border: "none", background: modus === key ? G.kaart : "transparent", color: modus === key ? G.groen : G.tekstZacht, fontSize: 12.5, cursor: "pointer", fontWeight: modus === key ? 500 : 400, boxShadow: modus === key ? "0 1px 3px rgba(0,0,0,.08)" : "none" }}>
                {label}
              </button>
            ))}
          </div>

          {/* AH Link invoer */}
          {modus === "link" && (
            <div>
              <label style={labelStijl}>Albert Heijn Allerhande link</label>
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input
                  value={link}
                  onChange={e => { setLink(e.target.value); setLinkStatus(""); }}
                  onKeyDown={e => e.key === "Enter" && verwerkLink()}
                  placeholder="https://www.ah.nl/allerhande/recept/..."
                  style={{ ...inputStijl, flex: 1 }}
                />
                <button onClick={verwerkLink} style={{ padding: "7px 14px", background: G.groen, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 12.5, whiteSpace: "nowrap" }}>
                  Laden
                </button>
              </div>
              {linkStatus === "fout" && (
                <div style={{ fontSize: 11.5, color: "#B03030", background: "#FEF0F0", border: "1px solid #F5C0C0", borderRadius: 7, padding: "7px 10px" }}>
                  Geen geldige AH Allerhande link. Gebruik een link zoals:<br />
                  <span style={{ fontFamily: "monospace", fontSize: 10.5 }}>ah.nl/allerhande/recept/R-R.../naam</span>
                </div>
              )}
              {linkStatus === "laden" && <div style={{ fontSize: 11.5, color: G.groenMid }}>Recept verwerken...</div>}
              <div style={{ marginTop: 16, padding: "12px 14px", background: G.groenPale, borderRadius: 8, fontSize: 11.5, color: G.tekstMid, lineHeight: 1.6 }}>
                💡 Kopieer de URL van een recept op <strong>ah.nl/allerhande</strong> en plak hem hier. Naam en foto worden automatisch ingeladen.
              </div>
            </div>
          )}

          {/* Handmatig / na link laden */}
          {modus === "handmatig" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {/* Naam */}
              <div>
                <label style={labelStijl}>Naam recept *</label>
                <input value={form.naam} onChange={e => setForm(f => ({ ...f, naam: e.target.value }))} placeholder="Bijv. Spaghetti met courgettesaus" style={inputStijl} />
              </div>

              {/* Bijnaam */}
              <div>
                <label style={labelStijl}>Bijnaam <span style={{ fontWeight: 400, textTransform: "none", fontSize: 10 }}>(optioneel)</span></label>
                <input value={form.nick} onChange={e => setForm(f => ({ ...f, nick: e.target.value }))} placeholder="Bijv. Mamas pasta" style={inputStijl} />
              </div>

              {/* URL */}
              <div>
                <label style={labelStijl}>AH link <span style={{ fontWeight: 400, textTransform: "none", fontSize: 10 }}>(optioneel)</span></label>
                <input value={form.url} onChange={e => setForm(f => ({ ...f, url: e.target.value }))} placeholder="https://www.ah.nl/allerhande/recept/..." style={inputStijl} />
              </div>

              {/* Preview afbeelding als ingeladen via link */}
              {form.imageUrl && (
                <div>
                  <label style={labelStijl}>Foto preview</label>
                  <img src={form.imageUrl} onError={e => e.target.style.display="none"} style={{ width: "100%", height: 120, objectFit: "cover", borderRadius: 8 }} />
                </div>
              )}

              {/* Rating */}
              <div>
                <label style={labelStijl}>Rating</label>
                <div style={{ display: "flex", gap: 4 }}>
                  {[1,2,3,4,5].map(n => (
                    <span key={n} onClick={() => setForm(f => ({ ...f, rating: n === f.rating ? 0 : n }))} onMouseEnter={() => setHoverRating(n)} onMouseLeave={() => setHoverRating(0)}
                      style={{ fontSize: 26, cursor: "pointer", color: n <= (hoverRating || form.rating) ? "#C4940A" : G.zandMid, lineHeight: 1 }}>★</span>
                  ))}
                </div>
              </div>

              {/* Aantal dagen */}
              <div>
                <label style={labelStijl}>Lekker voor hoeveel dagen?</label>
                <div style={{ display: "flex", gap: 6 }}>
                  {[0,1,2,3].map(n => (
                    <button key={n} onClick={() => setForm(f => ({ ...f, dagen: n }))} style={{ padding: "5px 12px", borderRadius: 20, border: `1px solid ${form.dagen === n ? G.groen : G.zandMid}`, background: form.dagen === n ? G.groen : G.zand, color: form.dagen === n ? "#fff" : G.tekstMid, fontSize: 12, cursor: "pointer" }}>
                      {n === 0 ? "1 dag" : `${n+1} dag${n > 0 ? "en" : ""}`}
                    </button>
                  ))}
                </div>
              </div>

              {/* Notities */}
              <div>
                <label style={labelStijl}>Notities <span style={{ fontWeight: 400, textTransform: "none", fontSize: 10 }}>(optioneel)</span></label>
                <textarea value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Tips, aanpassingen..." style={{ ...inputStijl, minHeight: 60, resize: "vertical" }} />
              </div>

              {/* Tags */}
              <div>
                <label style={labelStijl}>Tags</label>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 7 }}>
                  {form.tags.map(t => (
                    <span key={t} style={{ fontSize: 10.5, padding: "3px 9px", background: G.groenPale, color: G.groenMid, borderRadius: 20, display: "flex", alignItems: "center", gap: 3 }}>
                      {t}<span onClick={() => setForm(f => ({ ...f, tags: f.tags.filter(x => x !== t) }))} style={{ cursor: "pointer", fontSize: 11, color: G.groenLicht }}>✕</span>
                    </span>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 7 }}>
                  {["BBQ","Kerst","Snel","Favoriet","Vis"].filter(t => !form.tags.includes(t)).map(t => (
                    <span key={t} onClick={() => voegTagToe(t)} style={{ fontSize: 10.5, padding: "3px 9px", background: G.zand, color: G.zandDeep, borderRadius: 20, border: `1px dashed ${G.zandDonker}`, cursor: "pointer" }}>+ {t}</span>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 5 }}>
                  <input value={nieuweTag} onChange={e => setNieuweTag(e.target.value)} onKeyDown={e => e.key === "Enter" && voegTagToe()} placeholder="Nieuwe tag..." style={{ ...inputStijl, flex: 1 }} />
                  <button onClick={() => voegTagToe()} style={{ padding: "5px 11px", background: G.groen, color: "#fff", border: "none", borderRadius: 7, cursor: "pointer", fontSize: 12 }}>+</button>
                </div>
              </div>

              {/* Opslaan */}
