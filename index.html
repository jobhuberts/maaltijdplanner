              <button onClick={opslaan} disabled={!form.naam.trim()} style={{ width: "100%", padding: "9px", background: form.naam.trim() ? G.groen : G.groenLicht, color: "#fff", border: "none", borderRadius: 8, cursor: form.naam.trim() ? "pointer" : "not-allowed", fontSize: 13, fontWeight: 500, marginTop: 4 }}>
                Recept toevoegen
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── PAGINA: RECEPTEN ───────────────────────────────────────────────────────
function ReceptenPage({ recepten, setRecepten, isMobile = false }) {
  const mobile = isMobile;
  const [zoek, setZoek] = useState("");
  const [filterSeizoen, setFilterSeizoen] = useState("");
  const [filterTag, setFilterTag] = useState("");
  const [filterFavoriet, setFilterFavoriet] = useState(false);
  const [detailRecept, setDetailRecept] = useState(null);
  const [toonToevoegen, setToonToevoegen] = useState(false);

  const filtered = recepten.filter(r => {
    if (zoek && !(r.naam + " " + r.nick).toLowerCase().includes(zoek.toLowerCase())) return false;
    if (filterSeizoen && !(Array.isArray(r.seizoen) ? r.seizoen.includes(filterSeizoen) : r.seizoen === filterSeizoen)) return false;
    if (filterTag && !(r.tags || []).includes(filterTag)) return false;
    if (filterFavoriet && !r.favoriet) return false;
    return true;
  });

  const toggleFavoriet = (id) => {
    setRecepten(recepten.map(r => r.id === id ? { ...r, favoriet: !r.favoriet } : r));
  };

  const saveRecept = (id, updates) => {
    setRecepten(recepten.map(r => r.id === id ? { ...r, ...updates } : r));
    setDetailRecept(null);
  };

  const voegReceptToe = (nieuw) => {
    setRecepten([...recepten, nieuw]);
    setToonToevoegen(false);
  };

  // Dynamische taglijst voor filter
  const alleTags = [...new Set(recepten.flatMap(r => r.tags || []))].sort();

  return (
    <div style={{ padding: mobile ? 16 : 24, maxWidth: 860 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4, gap: 10 }}>
        <div style={{ fontFamily: "Georgia,serif", fontSize: mobile ? 20 : 24, color: G.groen }}>Recepten</div>
        <button onClick={() => setToonToevoegen(true)} style={{ display: "flex", alignItems: "center", gap: 5, padding: mobile ? "10px 14px" : "8px 14px", background: G.groen, color: "#fff", border: "none", borderRadius: 8, fontSize: mobile ? 14 : 12.5, cursor: "pointer", flexShrink: 0 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          {mobile ? "Toevoegen" : "Recept toevoegen"}
        </button>
      </div>
      <div style={{ fontSize: mobile ? 14 : 12.5, color: G.tekstMid, marginBottom: 16 }}>Jouw recepten van Albert Heijn Allerhande</div>

      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        <input value={zoek} onChange={e => setZoek(e.target.value)} placeholder="Zoek recept..." style={{ flex: 1, minWidth: 140, border: `1px solid ${G.zandMid}`, background: G.kaart, borderRadius: 8, padding: mobile ? "12px 14px" : "7px 10px", color: G.tekst, outline: "none" }} />
        <button onClick={() => setFilterFavoriet(f => !f)} title="Toon alleen favorieten" style={{ display: "flex", alignItems: "center", gap: 5, padding: mobile ? "12px 14px" : "7px 12px", border: `1px solid ${filterFavoriet ? G.groenLicht : G.zandMid}`, borderRadius: 8, background: filterFavoriet ? G.groenPale : G.kaart, cursor: "pointer", fontSize: mobile ? 14 : 12, color: filterFavoriet ? G.groen : G.tekstMid }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill={filterFavoriet ? G.groen : "none"} stroke={filterFavoriet ? G.groen : G.groenLicht} strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          {!mobile && "Favorieten"}
        </button>
        <select value={filterSeizoen} onChange={e => setFilterSeizoen(e.target.value)} style={{ border: `1px solid ${G.zandMid}`, background: G.kaart, borderRadius: 8, padding: mobile ? "12px 10px" : "7px 9px", color: G.tekst, outline: "none", flex: mobile ? 1 : "unset" }}>
          <option value="">Alle seizoenen</option>
          {["lente","zomer","herfst","winter"].map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        {!mobile && (
          <select value={filterTag} onChange={e => setFilterTag(e.target.value)} style={{ border: `1px solid ${G.zandMid}`, background: G.kaart, borderRadius: 8, padding: "7px 9px", fontSize: 11.5, color: G.tekst, outline: "none" }}>
            <option value="">Alle tags</option>
            {alleTags.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        )}
      </div>

      <div style={{ fontSize: mobile ? 13 : 11.5, color: G.tekstZacht, marginBottom: 10 }}>{filtered.length} van {recepten.length} recepten</div>

      <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(auto-fill,minmax(175px,1fr))", gap: mobile ? 10 : 12 }}>
        {filtered.map(r => <ReceptKaart key={r.id} recept={r} onClick={() => setDetailRecept(r)} onToggleFavoriet={() => toggleFavoriet(r.id)} />)}
      </div>

      {detailRecept && (
        <ReceptDetailModal
          recept={detailRecept}
          alleRecepten={recepten}
          mobile={mobile}
          onClose={() => setDetailRecept(null)}
          onSave={updates => saveRecept(detailRecept.id, updates)}
        />
      )}

      {toonToevoegen && (
        <ToevoegenModal
          volgendId={recepten.length}
          onClose={() => setToonToevoegen(false)}
          onSave={voegReceptToe}
        />
      )}
    </div>
  );
}

// ─── PAGINA: BOODSCHAPPEN ───────────────────────────────────────────────────
function BoodschappenPage({ planning, isMobile = false }) {
  const mobile = isMobile;
  // Toon aankomende dagen (vandaag + 7 vooruit) met een recept, gesorteerd op datum
  const vandaag = vandaagISO();
  const gepland = Object.entries(planning)
    .filter(([k, p]) => p.recept && k >= vandaag && k <= datumOffset(7))
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([key, p]) => ({ key, label: (relatieveLabel(key) || dagNaamVol(key)) + " " + formatDDMM(key), recept: p.recept, personen: p.personen || 4 }));
  const [afgevinkt, setAfgevinkt] = useState({});
  const [aiLijst, setAiLijst] = useState("");
  const [aiBezig, setAiBezig] = useState(false);

  const genereerLijst = async () => {
    if (!gepland.length) return;
    setAiBezig(true);
    setAiLijst("Lijst genereren...");
    const lijst = gepland.map(d => `${d.label}: ${d.recept.naam} (${d.personen} pers.)`).join(", ");
    try {
      const data = await claudeFetch({ model: "claude-sonnet-4-5", max_tokens: 500, messages: [{ role: "user", content: `Maak een beknopte boodschappenlijst voor een vegetarisch gezin. Maaltijden deze week: ${lijst}. Geef de hoofd-ingrediënten per categorie (Groente, Pasta/rijst/granen, Zuivel, Overig). Max 20 items totaal. Geen inleiding, direct de lijst.` }] });
      setAiLijst(data.content?.[0]?.text || "Geen lijst ontvangen.");
    } catch (e) {
      setAiLijst("Fout bij genereren.");
    }
    setAiBezig(false);
  };

  const exporteer = () => {
    let t = "Boodschappenlijst\n\n";
    gepland.forEach(d => { t += `${d.label}: ${d.recept.naam}\n${d.recept.url}\n\n`; });
    if (aiLijst) t += "\nAI Boodschappenlijst:\n" + aiLijst;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([t], { type: "text/plain" }));
    a.download = "boodschappenlijst.txt"; a.click();
  };

  return (
    <div style={{ padding: mobile ? 16 : 24, maxWidth: 700 }}>
      <div style={{ fontFamily: "Georgia,serif", fontSize: mobile ? 20 : 24, color: G.groen, marginBottom: 4 }}>Boodschappenlijst</div>
      <div style={{ fontSize: mobile ? 14 : 12.5, color: G.tekstMid, marginBottom: 20 }}>Gegenereerd op basis van je weekplanning</div>

      {gepland.length === 0 ? (
        <div style={{ background: G.kaart, border: `1px solid ${G.zandMid}`, borderRadius: 12, padding: 32, textAlign: "center", color: G.tekstZacht }}>
          Plan eerst je week om een boodschappenlijst te genereren
        </div>
      ) : (
        <div style={{ background: G.kaart, border: `1px solid ${G.zandMid}`, borderRadius: 12, padding: "18px 20px" }}>
          <div style={{ fontFamily: "Georgia,serif", fontSize: 14, color: G.groen, marginBottom: 14 }}>Maaltijden deze week</div>
          {(() => {
            // Groepeer aaneengesloten dagen met hetzelfde recept
            const groepen = [];
            let i = 0;
            while (i < gepland.length) {
              const d = gepland[i];
              const r = d.recept;
              const nextD = gepland[i+1];
              const nextR = nextD ? nextD.recept : null;
              if (nextR && nextR.id === r.id) {
                // 2-daagse groep
                groepen.push({ dagen: [d, nextD], recept: r, tweedaags: true });
                i += 2;
              } else {
                groepen.push({ dagen: [d], recept: r, tweedaags: false });
                i += 1;
              }
            }
            return groepen.map((groep, gi) => {
              const { dagen, recept: r, tweedaags } = groep;
              const dagLabels = dagen.map(d => d.label).join(" + ");
              const checkKey = dagen[0].key;
              const totalPersStr = tweedaags
                ? `${dagen[0].personen} pers. × 2 avonden`
                : `${dagen[0].personen} pers.`;
              return (
                <div key={gi} style={{ marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, paddingBottom: 6, borderBottom: `1px solid ${tweedaags ? G.groenZacht : G.zandMid}`, marginBottom: 7 }}>
                    {tweedaags && (
                      <span style={{ flexShrink: 0, fontSize: 9.5, padding: "2px 7px", borderRadius: 20, fontWeight: 600, background: G.groen, color: "#fff" }}>
                        2 dagen
                      </span>
                    )}
                    <span style={{ fontFamily: "Georgia,serif", fontSize: 13.5, color: G.groen }}>
                      {dagLabels} — {r.naam}
                    </span>
                    <span style={{ marginLeft: "auto", fontSize: 11, color: G.tekstZacht, whiteSpace: "nowrap" }}>
                      {totalPersStr}
                    </span>
                  </div>
                  {tweedaags && (
                    <div style={{ fontSize: 11, color: G.groenMid, background: G.groenPale, borderRadius: 6, padding: "4px 8px", marginBottom: 6, display: "inline-flex", alignItems: "center", gap: 4 }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                      Reken dubbele hoeveelheid ingrediënten
                    </div>
                  )}
                  <div style={{ display: "flex", alignItems: "center", gap: 10, padding: mobile ? "8px 0" : "4px 0", fontSize: mobile ? 15 : 12.5, color: afgevinkt[checkKey] ? G.tekstZacht : G.tekst, textDecoration: afgevinkt[checkKey] ? "line-through" : "none" }}>
                    <input type="checkbox" checked={!!afgevinkt[checkKey]} onChange={e => setAfgevinkt({ ...afgevinkt, [checkKey]: e.target.checked })} style={{ accentColor: G.groen, width: mobile ? 20 : 14, height: mobile ? 20 : 14 }} />
                    <a href={r.url} target="_blank" rel="noreferrer" style={{ color: G.groenMid, fontSize: mobile ? 14 : 11.5 }}>Bekijk ingrediënten op AH ↗</a>
                  </div>
                  {/* Extra ingrediënten uit notities */}
                  {r.notes && r.notes.trim() && (() => {
                    const isIngredient = regel => {
                      if (regel.length < 2) return false;
                      // Geen URLs
                      if (/https?:\/\//.test(regel)) return false;
                      // Geen zeer lange regels (waarschijnlijk instructies of beschrijving)
                      if (regel.length > 80) return false;
                      // Geen instructies (Nederlandse gebiedende wijs)
                      if (/^(snijd|snij|bak|kook|meng|roer|voeg|verhit|giet|doe|zet|laat|schil|was|hak|rasp|breng|stoof|fruit|braad|klop|zeef|dek|verwijder|pel|drain|spoel|serveer|bestrooi|marineer|maak|gebruik|verwarm|los|dip|vul|leg|verdeel|vet|besmeer)\b/i.test(regel)) return false;
                      // Geen zinnen die eindigen op een punt (geen afkorting)
                      if (/[a-z]{4,}\.$/.test(regel)) return false;
                      // Geen metadata-regels
                      if (/^(tip|noot|bron|bereidingstijd|oventijd|p\.p\.|per persoon|voor \d)/i.test(regel)) return false;
                      // Geen ontkenningen of adviezen ("niet te zoet", "geen zout")
                      if (/\bniet\b/i.test(regel)) return false;
                      if (/^geen\b/i.test(regel)) return false;
                      // Eindigt op een kookinfinitief → instructie ("aardappels lang bakken")
                      if (/\b(bakken|koken|snijden|mengen|roeren|braden|stoven|wokken|frituren|stomen|pocheren|marineren|inkoken|aanbraden|uitlekken|afgieten|verwarmen|afkoelen|opwarmen|sauteren|blancheren|gratineren|doorroeren|afbakken)$/i.test(regel)) return false;
                      // Bevat tijd/wijze-bijwoord + voedingsterm zonder hoeveelheid → tip ("lang op laag vuur")
                      if (/\b(lang|kort|even|langzaam|snel|goed|rustig)\b.*(vuur|warmte|hitte|pan|oven)/i.test(regel)) return false;
                      // Positief: bevat maateenheid of begint met getal → zeker een ingrediënt
                      const heeftMaat = /\b\d+[\.,]?\d*\s*(g|kg|ml|l|el|tl|dl|cl|stuk(s)?|snufje|scheutje|blikje|zakje|bosje|teen(tje)?|eetlepel|theelepel|kopje|handvol|plak(je)?|takje|blaadje|cm|liter)\b/i.test(regel);
                      const begintMetGetal = /^\d/.test(regel);
                      if (heeftMaat || begintMetGetal) return true;
                      // Korte frase: alleen accepteren als het eruitziet als een voedingsnaam
                      // (max 4 woorden, geen werkwoord-achtig woord erin)
                      const woorden = regel.split(/\s+/);
                      if (woorden.length > 4) return false;
                      const bevatWerkwoord = woorden.some(w => /^(is|zijn|heeft|hebben|moet|kunnen|willen|gaan|komen|staan|liggen|zitten|worden|doen|maken|nemen|zien|weten|zeggen|geven|denken|vinden|houden|lijken|blijven|laten|zetten|lijkt|past|smaakt|werkt)$/i.test(w));
                      return !bevatWerkwoord;
                    };
                    const extraItems = r.notes
                      .split(/\n/)
                      .map(regel => regel.replace(/^[-•*]\s*/, "").trim())
                      .filter(isIngredient);
                    if (extraItems.length === 0) return null;
                    return (
                      <div style={{ marginTop: 6, paddingLeft: 2 }}>
                        <div style={{ fontSize: 10, fontWeight: 500, textTransform: "uppercase", letterSpacing: ".05em", color: G.groenMid, marginBottom: 5 }}>
                          Extra ingrediënten uit notities
                        </div>
                        {extraItems.map((item, ii) => {
                          const itemKey = `${checkKey}_extra_${ii}`;
                          return (
                            <div key={itemKey} style={{ display: "flex", alignItems: "center", gap: 7, padding: "3px 0", fontSize: 12, color: afgevinkt[itemKey] ? G.tekstZacht : G.tekst, textDecoration: afgevinkt[itemKey] ? "line-through" : "none" }}>
                              <input type="checkbox" checked={!!afgevinkt[itemKey]} onChange={e => setAfgevinkt({ ...afgevinkt, [itemKey]: e.target.checked })} style={{ accentColor: G.groen }} />
                              <span>{item}</span>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>
              );
            });
          })()}
          <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
            <button onClick={genereerLijst} disabled={aiBezig} style={{ display: "flex", alignItems: "center", gap: 5, padding: "8px 16px", background: aiBezig ? G.groenLicht : G.groen, color: "#fff", border: "none", borderRadius: 8, fontSize: 12.5, cursor: aiBezig ? "not-allowed" : "pointer" }}>
              {aiBezig ? "Genereren..." : "AI boodschappenlijst"}
            </button>
            <button onClick={exporteer} style={{ display: "flex", alignItems: "center", gap: 5, padding: "8px 16px", background: G.kaart, color: G.tekstMid, border: `1px solid ${G.zandMid}`, borderRadius: 8, fontSize: 12.5, cursor: "pointer" }}>
              Exporteer .txt
            </button>
          </div>
          {aiLijst && (
            <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${G.zandMid}` }}>
              <div style={{ fontSize: 10, fontWeight: 500, color: G.groen, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 8 }}>AI Boodschappenlijst</div>
              <div style={{ fontSize: 12.5, color: G.tekstMid, lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{aiLijst}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── PAGINA: KALENDER ───────────────────────────────────────────────────────
function KalenderPage() {
  const [geschiedenis, setGeschiedenisState] = useState(() => loadGeschiedenis());
  const [weergaveJaar, setWeergaveJaar] = useState(() => new Date().getFullYear());
  const [weergaveMaand, setWeergaveMaand] = useState(() => new Date().getMonth());
  // Bewerken van een geschiedenis-invoer
  const [bewerkDag, setBewerkDag] = useState(null); // { iso, maaltijd }
  const [bewerkInput, setBewerkInput] = useState("");

  const opslaanBewerking = () => {
    if (!bewerkDag || !bewerkInput.trim()) return;
    const bijgewerkt = {
      ...geschiedenis,
      [bewerkDag.iso]: { ...(geschiedenis[bewerkDag.iso] || {}), maaltijd: bewerkInput.trim() }
    };
    saveGeschiedenis(bijgewerkt);
    setGeschiedenisState(bijgewerkt);
    setBewerkDag(null);
  };

  const verwijderGeschiedenisEntry = (iso) => {
    const bijgewerkt = { ...geschiedenis };
    delete bijgewerkt[iso];
    saveGeschiedenis(bijgewerkt);
    setGeschiedenisState(bijgewerkt);
    setBewerkDag(null);
  };

  const MAANDEN = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
  const DAGLETTERS = ["Ma","Di","Wo","Do","Vr","Za","Zo"];

  // Navigatie
  const vorigeM = () => {
    if (weergaveMaand === 0) { setWeergaveMaand(11); setWeergaveJaar(y => y-1); }
    else setWeergaveMaand(m => m-1);
  };
  const volgendeM = () => {
    if (weergaveMaand === 11) { setWeergaveMaand(0); setWeergaveJaar(y => y+1); }
    else setWeergaveMaand(m => m+1);
  };

  // Bouw kalenderraster voor deze maand
  const eersteD = new Date(weergaveJaar, weergaveMaand, 1);
  const aantalDagen = new Date(weergaveJaar, weergaveMaand + 1, 0).getDate();
  // Weekdag van de 1e (0=zo → omzetten naar ma=0)
  const startOffset = (eersteD.getDay() + 6) % 7;
  const vandaag = new Date().toISOString().split("T")[0];

  const dagen = [];

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button onClick={() => { setWeergaveMaand(new Date().getMonth()); setWeergaveJaar(new Date().getFullYear()); }} style={{ marginLeft: "auto", padding: "5px 12px", border: `1px solid ${G.zandMid}`, borderRadius: 7, background: G.kaart, fontSize: 12, color: G.tekstMid, cursor: "pointer" }}>

          <div style={{ width: 12, height: 12, background: G.groenPale, borderRadius: 2, borderLeft: `2px solid ${G.groenLicht}` }} />

            <span style={{ fontSize: 9, color: "#fff" }}>•</span>
          </div>
          Vandaag
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ fontSize: 14 }}>🌤</span>
          Weer van die dag
        </div>
        {Object.keys(geschiedenis).length > 0 && (
          <div style={{ marginLeft: "auto", fontSize: 11, color: G.tekstZacht }}>
            {Object.keys(geschiedenis).length} dagen met maaltijden opgeslagen

      <div style={{ fontSize: 11, color: G.tekstZacht, marginTop: 10 }}>Klik op een dag om een maaltijd in te vullen of te bewerken</div>

      {/* Bewerkmodal */}
      {bewerkDag && (

// ─── PAGINA: STATISTIEKEN ────────────────────────────────────────────────────
function StatistiekenPage({ recepten, planning }) {
  const geschiedenis = loadGeschiedenis();
  const entries = Object.entries(geschiedenis); // [[datum, {maaltijd, weer, temp}], ...]

  // ── Voedingswaarden schatting per gerechtstype ──────────────────────────
  // Gebaseerd op typische waarden voor een gezinsportie (4 pers.)
  const VOEDING = {
    pasta:    { kcal: 620, proteïne: 22, koolhydraten: 85, vetten: 18, vezels: 6 },
    stamppot: { kcal: 520, proteïne: 15, koolhydraten: 70, vetten: 16, vezels: 10 },
    stoof:    { kcal: 480, proteïne: 18, koolhydraten: 45, vetten: 20, vezels: 9 },
    traybake: { kcal: 440, proteïne: 16, koolhydraten: 50, vetten: 18, vezels: 8 },
    wrap:     { kcal: 560, proteïne: 20, koolhydraten: 65, vetten: 20, vezels: 7 },
    rijst:    { kcal: 580, proteïne: 18, koolhydraten: 90, vetten: 14, vezels: 5 },
    soep:     { kcal: 320, proteïne: 14, koolhydraten: 38, vetten: 10, vezels: 8 },
    noedels:  { kcal: 540, proteïne: 20, koolhydraten: 78, vetten: 16, vezels: 5 },
    quiche:   { kcal: 580, proteïne: 18, koolhydraten: 42, vetten: 32, vezels: 4 },
    salade:   { kcal: 320, proteïne: 12, koolhydraten: 28, vetten: 16, vezels: 7 },
    curry:    { kcal: 520, proteïne: 18, koolhydraten: 60, vetten: 20, vezels: 7 },
    overig:   { kcal: 500, proteïne: 17, koolhydraten: 58, vetten: 18, vezels: 7 },
  };

  const CATS_MAP = {
    pasta:    ["spaghetti","pasta","orzo","tagliatelle","linguine","macaroni","orecchiette","tortellini","lasagne"],
    stamppot: ["stamppot"],
    stoof:    ["stoof","stoofpot","bonenstoof"],
    traybake: ["traybake","plaattaart","ovenschotel"],
    wrap:     ["wrap","enchilada"],
    rijst:    ["nasi","rijst","risotto"],
    soep:     ["soep"],
    noedels:  ["noedels","noodles","gebakken noedels"],
    quiche:   ["quiche","taart"],
    salade:   ["salade"],
    curry:    ["curry","tikka","butter"],
  };

  function getCatVanNaam(naam) {
    const n = naam.toLowerCase();
    for (const [cat, ws] of Object.entries(CATS_MAP)) {
      if (ws.some(w => n.includes(w))) return cat;
    }
    return "overig";
  }

  function isVis(naam) {
    return ["zalm","tonijn","vis","kabeljauw","garnalen","makreel","sardines"].some(w => naam.toLowerCase().includes(w));
  }

  // ── Bereken statistieken ──────────────────────────────────────────────
  // Maaltijdfrequentie uit geschiedenis
  const telMap = {};
  entries.forEach(([, e]) => {
    const n = e.maaltijd;
    telMap[n] = (telMap[n] || 0) + 1;
  });
  const meestGegeten = Object.entries(telMap)
    .sort((a,b) => b[1]-a[1])
    .slice(0,5);

  // Koppel entries aan recepten voor rijkere data
  const receptMap = Object.fromEntries(recepten.map(r => [r.naam.toLowerCase(), r]));
  function vindRecept(naam) {
    return receptMap[naam.toLowerCase()] || recepten.find(r => r.naam.toLowerCase().includes(naam.toLowerCase().substring(0,15)));
  }

  // Weken analyse: groepeer per week (ISO weeknummer)
  function weekKey(isoDate) {
    const d = new Date(isoDate);
    const dag = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const donderdag = new Date(dag);
    donderdag.setDate(dag.getDate() + 3 - (dag.getDay() + 6) % 7);
    const eersteJan = new Date(donderdag.getFullYear(), 0, 4);
    return `${donderdag.getFullYear()}-W${String(1 + Math.round(((donderdag - eersteJan) / 86400000 - 3 + (eersteJan.getDay() + 6) % 7) / 7)).padStart(2,"0")}`;
  }

  const weken = {};
  entries.forEach(([datum, e]) => {
    const wk = weekKey(datum);
    if (!weken[wk]) weken[wk] = [];
    weken[wk].push({ datum, ...e });
  });

  // Weken met alleen 5-sterren
  const vijfSterrenWeken = Object.values(weken).filter(week => {
    const metRating = week.filter(e => {
      const r = vindRecept(e.maaltijd);
      return r && r.rating > 0;
    });
    return metRating.length > 0 && metRating.every(e => {
      const r = vindRecept(e.maaltijd);
      return r && r.rating === 5;
    });
  }).length;

  // Vis vs vega telling
  let visTeller = 0, vegaTeller = 0;
  entries.forEach(([, e]) => {
    if (isVis(e.maaltijd)) visTeller++;
    else vegaTeller++;
  });

  // Gemiddelde rating van alle geplande maaltijden
  const ratingsLijst = entries
    .map(([, e]) => { const r = vindRecept(e.maaltijd); return r ? r.rating : 0; })
    .filter(r => r > 0);
  const gemRating = ratingsLijst.length > 0
    ? (ratingsLijst.reduce((s,r) => s+r, 0) / ratingsLijst.length).toFixed(1)
    : null;

  // Voedingswaarden — periode instelbaar via state
  // Datumformattering helper
  function fmtDatum(d) {
    return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
  }

  // Periode opties — "komend" = toekomstige planning via props
  // dagen: positief = terug in tijd, "komend" = speciale modus
  const PERIODE_OPTIES = [
    { label: "Komende 4 dagen", dagen: "komend" },
    { label: "7 dagen",  dagen: 7 },
    { label: "14 dagen", dagen: 14 },
    { label: "30 dagen", dagen: 30 },
    { label: "90 dagen", dagen: 90 },
    { label: "Alles",    dagen: 99999 },
  ];
  const [voedingPeriode, setVoedingPeriode] = useState(7);

  // Bereken datumbereik voor weergave
  const nu = new Date();
  let periodeLabel = "";
  let recenteEntries = [];

  if (voedingPeriode === "komend") {
    // Gebruik de geplande recepten uit de planning prop (sleutels zijn al ISO-datums)
    const vandaagStr = vandaagISO();
    const geplande = planning ? Object.entries(planning)
      .filter(([key, p]) => p.recept && key >= vandaagStr)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([key, p]) => ({ datum: key, maaltijd: p.recept.naam, datObj: new Date(key+"T00:00:00") }))
      : [];
    recenteEntries = geplande.map(g => [g.datum, { maaltijd: g.maaltijd }]);
    if (geplande.length > 0) {
      const vroegste = geplande[0].datObj;
      const laatste  = geplande[geplande.length - 1].datObj;
      periodeLabel = `${fmtDatum(vroegste)} – ${fmtDatum(laatste)}`;
    } else {
      periodeLabel = "geen planning";
    }
  } else {
    const start = new Date(nu);
    start.setDate(start.getDate() - (voedingPeriode >= 99999 ? 3650 : voedingPeriode));
    recenteEntries = entries.filter(([datum]) => new Date(datum) >= start);
    if (recenteEntries.length > 0) {
      const datums = recenteEntries.map(([d]) => new Date(d));
      const vroegste = new Date(Math.min(...datums));
      const laatste  = new Date(Math.max(...datums));
      periodeLabel = voedingPeriode >= 99999
        ? `${fmtDatum(vroegste)} – ${fmtDatum(laatste)}`
        : `${fmtDatum(start)} – ${fmtDatum(nu)}`;
    } else {
      periodeLabel = voedingPeriode >= 99999 ? "geen data" : `afgelopen ${voedingPeriode} dagen`;
    }
  }

  const voedingTotaal = { kcal: 0, proteïne: 0, koolhydraten: 0, vetten: 0, vezels: 0 };
  recenteEntries.forEach(([, e]) => {
    const cat = getCatVanNaam(e.maaltijd);
    const v = VOEDING[cat] || VOEDING.overig;
    const personen = 4;
    voedingTotaal.kcal += v.kcal / personen;
    voedingTotaal.proteïne += v.proteïne / personen;
    voedingTotaal.koolhydraten += v.koolhydraten / personen;
    voedingTotaal.vetten += v.vetten / personen;
    voedingTotaal.vezels += v.vezels / personen;
  });
  const aantalDagenRecent = recenteEntries.length || 1;
  const voedingGemPerDag = {
    kcal: Math.round(voedingTotaal.kcal / aantalDagenRecent),
    proteïne: Math.round(voedingTotaal.proteïne / aantalDagenRecent),
    koolhydraten: Math.round(voedingTotaal.koolhydraten / aantalDagenRecent),
    vetten: Math.round(voedingTotaal.vetten / aantalDagenRecent),
    vezels: Math.round(voedingTotaal.vezels / aantalDagenRecent),
  };

  // Categorie verdeling
  const catTelling = {};
  entries.forEach(([, e]) => {
    const c = getCatVanNaam(e.maaltijd);
    catTelling[c] = (catTelling[c] || 0) + 1;
  });

  // Stijl helpers

    <div style={{ background: G.kaart, borderRadius: 12, border: `1px solid ${G.zandMid}`, padding: "18px 20px", ...extra }}>
      {kinderen}
    </div>
  );
  const sKop = (tekst) => (
    <div style={{ fontSize: 10, fontWeight: 500, textTransform: "uppercase", letterSpacing: ".07em", color: G.groenMid, marginBottom: 10 }}>{tekst}</div>
  );

    <div style={{ textAlign: "center" }}>
      <div style={{ fontFamily: "Georgia,serif", fontSize: 32, color: G.groen, lineHeight: 1 }}>{waarde}</div>

      {sub && <div style={{ fontSize: 10, color: G.tekstZacht, marginTop: 2 }}>{sub}</div>}
    </div>
  );

  if (entries.length === 0) {
    return (
      <div style={{ padding: 24, maxWidth: 820 }}>
        <div style={{ fontFamily: "Georgia,serif", fontSize: 24, color: G.groen, marginBottom: 4 }}>Statistieken</div>

        <div style={{ background: G.kaart, border: `1px solid ${G.zandMid}`, borderRadius: 12, padding: 40, textAlign: "center", color: G.tekstZacht }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>📊</div>
          <div style={{ fontSize: 14, fontWeight: 500, color: G.tekstMid, marginBottom: 6 }}>Nog geen data</div>
          <div style={{ fontSize: 12.5 }}>Plan je eerste week om statistieken te zien. Je geschiedenis wordt automatisch opgebouwd.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: 24, maxWidth: 820 }}>
      <div style={{ fontFamily: "Georgia,serif", fontSize: 24, color: G.groen, marginBottom: 4 }}>Statistieken</div>
      <div style={{ fontSize: 12.5, color: G.tekstMid, marginBottom: 24 }}>

          [entries.length, "maaltijden gepland", null],

          [vijfSterrenWeken, "5-sterren weken", "alle maaltijden ★★★★★"],
          [Object.keys(weken).length, "weken bijgehouden", null],
        ].map(([w, l, s], i) => (
          <div key={i} style={{ background: G.kaart, borderRadius: 12, border: `1px solid ${G.zandMid}`, padding: "16px 12px" }}>

                  </div>
                  <div style={{ height: 4, background: G.zandMid, borderRadius: 2, overflow: "hidden" }}>

              {visTeller > 0 && <div style={{ flex: visTeller, background: G.groenLicht, display: "flex", alignItems: "center", justifyContent: "center" }}>

        </div>
      </>, { marginBottom: 0 })}
    </div>
  );
}

function GezinPage({ savedData, onSave }) {
  const [gezin, setGezinState] = useState(savedData || DEFAULT_GEZIN);
  const [inputs, setInputs] = useState(["","","",""]);

  const setGezin = (g) => { setGezinState(g); if (onSave) onSave(g); };

  const addDieet = (i) => {
    const v = inputs[i].trim();
    if (!v || gezin[i].dieet.includes(v)) return;
    const updated = gezin.map((p, idx) => idx === i ? { ...p, dieet: [...p.dieet, v] } : p);
    setGezin(updated);
    setInputs(inputs.map((inp, idx) => idx === i ? "" : inp));
  };

  const removeDieet = (i, item) => {
    setGezin(gezin.map((p, idx) => idx === i ? { ...p, dieet: p.dieet.filter(d => d !== item) } : p));
  };

  return (
    <div style={{ padding: 24, maxWidth: 700 }}>
      <div style={{ fontFamily: "Georgia,serif", fontSize: 24, color: G.groen, marginBottom: 4 }}>Ons gezin</div>
      <div style={{ fontSize: 12.5, color: G.tekstMid, marginBottom: 20 }}>Dieetwensen per gezinslid</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: 12 }}>
        {gezin.map((p, i) => (
          <div key={i} style={{ background: G.kaart, borderRadius: 12, border: `1px solid ${G.zandMid}`, padding: 18, textAlign: "center" }}>
            <div style={{ width: 52, height: 52, borderRadius: "50%", background: p.kleur, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Georgia,serif", fontSize: 20, color: "#fff", margin: "0 auto 10px" }}>{p.avatar}</div>
            <div style={{ fontFamily: "Georgia,serif", fontSize: 14, color: G.tekst, marginBottom: 3 }}>{p.naam}</div>
            <div style={{ fontSize: 10.5, color: G.tekstZacht, marginBottom: 12 }}>{p.rol}</div>
            <div style={{ marginBottom: 9 }}>
              {p.dieet.map(d => (
                <div key={d} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "3px 7px", background: G.zand, borderRadius: 7, marginBottom: 3, fontSize: 11.5 }}>
                  <span>{d}</span>
                  <span onClick={() => removeDieet(i, d)} style={{ cursor: "pointer", color: G.tekstZacht, fontSize: 12 }}>✕</span>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              <input value={inputs[i]} onChange={e => setInputs(inputs.map((v, idx) => idx === i ? e.target.value : v))} onKeyDown={e => e.key === "Enter" && addDieet(i)} placeholder="Dieetwens..." style={{ flex: 1, border: `1px solid ${G.zandMid}`, borderRadius: 7, padding: "4px 7px", fontSize: 11, background: G.zand, outline: "none", color: G.tekst }} />
              <button onClick={() => addDieet(i)} style={{ padding: "4px 7px", background: G.groen, color: "#fff", border: "none", borderRadius: 7, cursor: "pointer", fontSize: 12 }}>+</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const LS_RECEPTEN     = "tw_recepten_v2";
const LS_PLANNING     = "tw_planning_v2";
const LS_GEZIN        = "tw_gezin_v2";
const LS_APIKEY       = "tw_apikey_v1";
const LS_GESCHIEDENIS = "tw_geschiedenis_v1";

function loadGeschiedenis() {
  try { return JSON.parse(localStorage.getItem(LS_GESCHIEDENIS) || "{}"); } catch { return {}; }
}
function saveGeschiedenis(g) {
  try { localStorage.setItem(LS_GESCHIEDENIS, JSON.stringify(g)); } catch {}

}
// Sla een maaltijd op voor een specifieke datum (ISO: YYYY-MM-DD)
function slaOpInGeschiedenis(datum, maaltijdNaam, weerIcon, weerTemp) {
  const g = loadGeschiedenis();
  g[datum] = { maaltijd: maaltijdNaam, weer: weerIcon || null, temp: weerTemp || null, opgeslagenOp: new Date().toISOString() };
  saveGeschiedenis(g);
}

function loadApiKey() {
  try { return localStorage.getItem(LS_APIKEY) || ""; } catch { return ""; }
}
function saveApiKey(k) {
  try { localStorage.setItem(LS_APIKEY, k); } catch {}
}
// Centrale fetch-helper die altijd de juiste headers meestuurt
async function claudeFetch(body) {
  const key = loadApiKey();
  const headers = { "Content-Type": "application/json" };
  if (key) {
    headers["x-api-key"] = key;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-beta"] = "pdfs-2024-09-25";
  }
  const resp = await fetch("http://localhost:3131/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  return resp.json();
}

function loadRecepten() {
  try {
    const raw = localStorage.getItem(LS_RECEPTEN);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!Array.isArray(data)) return null;
    return data.map(r => ({
      ...r,
      tags: Array.isArray(r.tags) ? r.tags : [],
      gemaaktData: Array.isArray(r.gemaaktData) ? r.gemaaktData : [],
    }));
  } catch { return null; }
}

}

      <div style={{ marginBottom: 24 }}>
        <div style={{ fontFamily: "'Playfair Display',Georgia,serif", fontSize: 24, color: "#2C3E2D", lineHeight: 1.2 }}>Tafel &amp; Week</div>
        <div style={{ fontSize: 14, color: "#8A9A8B", marginTop: 6 }}>Wat wil je doen?</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        {tegels.map(t => (
          <div key={t.key} onClick={() => onKlik(t.key)} style={{
            background: t.kleur.bg, borderRadius: 16, padding: "20px 16px 18px",
            border: `1px solid ${t.kleur.border}`, cursor: "pointer",
            display: "flex", flexDirection: "column", gap: 12,
            boxShadow: "0 2px 8px rgba(44,74,46,.07)", minHeight: 130,
            WebkitTapHighlightColor: "transparent"
          }}>
            <div style={{ color: t.kleur.icon }}>{t.icon}</div>
            <div>
              <div style={{ fontWeight: 500, fontSize: 15, color: "#2C3E2D" }}>{t.label}</div>
              <div style={{ fontSize: 12, color: "#8A9A8B", marginTop: 3, lineHeight: 1.4 }}>{t.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Mobile: Bottom sheet overlay ──────────────────────────────────────────
function MobileSheet({ titel, onSluit, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.45)", zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }} onClick={onSluit}>
      <div style={{ background: "#F7F3EC", borderRadius: "20px 20px 0 0", maxHeight: "88vh", display: "flex", flexDirection: "column", overflow: "hidden" }} onClick={e => e.stopPropagation()}>
        <div style={{ padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #DDD5C4", flexShrink: 0 }}>
          <div style={{ fontFamily: "'Playfair Display',Georgia,serif", fontSize: 17, color: "#2C3E2D" }}>{titel}</div>
          <button onClick={onSluit} style={{ background: "none", border: "none", fontSize: 22, color: "#8A9A8B", cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>✕</button>
        </div>
        <div style={{ overflowY: "auto", flex: 1, WebkitOverflowScrolling: "touch" }}>{children}</div>
      </div>
    </div>
  );
}

// ── Root app met localStorage ─────────────────────────────────────────────
function AppWithStorage() {
  const [pagina, setPagina] = useState("planner");
  const [apiKey, setApiKeyState] = useState(() => loadApiKey());
  const [toonApiKey, setToonApiKey] = useState(() => !loadApiKey());
  const [recepten, setReceptenState] = useState(() => loadRecepten() || initRecepten);
  const [planning, setPlanningState] = useState(() => {
    const saved = loadPlanning();
    if (!saved) return initPlanning;
    const receptenData = loadRecepten() || initRecepten;
    const receptenMap = Object.fromEntries(receptenData.map(r => [r.id, r]));
    const result = {};
    for (const [k, v] of Object.entries(saved)) {
      result[k] = { ...v, recept: v.recept ? (receptenMap[v.recept.id] || v.recept) : null };
    }
    return result;
  });
  const [gezinData, setGezinDataState] = useState(() => loadGezin() || null);
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  const [mobilePagina, setMobilePagina] = useState("home");
  const [mobileOverlay, setMobileOverlay] = useState(null);

  useEffect(() => {
    const mq = window.matchMedia("(max-width: 767px)");
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);

  // ── Firebase realtime sync ──────────────────────────────────────────────
  useEffect(() => {
    // Recepten
    const refRecepten = fbDb.ref("recepten");
    refRecepten.on("value", snap => {
      const data = snap.val();
      if (data && Array.isArray(data)) {
        const normalized = data.map(r => ({
          ...r,
          tags: Array.isArray(r.tags) ? r.tags : [],
          gemaaktData: Array.isArray(r.gemaaktData) ? r.gemaaktData : [],
        }));
        setReceptenState(normalized);
        try { localStorage.setItem(LS_RECEPTEN, JSON.stringify(normalized)); } catch {}
      }
    });
    // Planning
    const refPlanning = fbDb.ref("planning");
    refPlanning.on("value", snap => {
      const data = snap.val();
      if (data && typeof data === "object") {
        const gemigreerd = migreerPlanning(data);
        const receptenData = loadRecepten() || initRecepten;
        const receptenMap = Object.fromEntries(receptenData.map(r => [r.id, r]));
        const result = {};
        for (const [k, v] of Object.entries(gemigreerd)) {
          result[k] = { ...v, recept: v.recept ? (receptenMap[v.recept.id] || v.recept) : null };
        }
        setPlanningState(result);
        try { localStorage.setItem(LS_PLANNING, JSON.stringify(result)); } catch {}
      }
    });
    // Gezin
    const refGezin = fbDb.ref("gezin");
    refGezin.on("value", snap => {
      const data = snap.val();
      if (data) {
        setGezinDataState(data);
        try { localStorage.setItem(LS_GEZIN, JSON.stringify(data)); } catch {}
      }
    });
    return () => {
      refRecepten.off();
      refPlanning.off();
      refGezin.off();
    };
  }, []);

  const setRecepten = (r) => { setReceptenState(r); saveRecepten(r); };
  const setPlanning = (p) => { setPlanningState(p); savePlanning(p); };

  const paginaTitels = { planner: "Weekplanning", recepten: "Recepten", boodschappen: "Boodschappen", kalender: "Geschiedenis" };

  // ── Mobile layout ─────────────────────────────────────────────────────
  if (isMobile) {
    const btnStijl = { background: "none", border: "none", color: "rgba(255,255,255,.82)", cursor: "pointer", padding: 8, borderRadius: 8, display: "flex", alignItems: "center" };
    return (
      <div style={{ display: "flex", flexDirection: "column", height: "100dvh", fontFamily: "'DM Sans',sans-serif", fontSize: 14, color: G.tekst, background: G.zand, overflow: "hidden" }}>

        {/* Top navbar */}
        <header style={{ background: G.groen, paddingLeft: 16, paddingRight: 8, paddingTop: "calc(env(safe-area-inset-top) + 10px)", paddingBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
          {mobilePagina !== "home" ? (
            <button onClick={() => setMobilePagina("home")} style={{ ...btnStijl, gap: 4, fontSize: 14 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><polyline points="15 18 9 12 15 6"/></svg>
              {paginaTitels[mobilePagina]}
            </button>
          ) : (
            <div style={{ fontFamily: "'Playfair Display',Georgia,serif", fontSize: 17, color: "#FAFAF7" }}>Tafel &amp; Week</div>
          )}
          <div style={{ display: "flex" }}>
            <button onClick={() => setMobileOverlay("statistieken")} style={btnStijl} title="Statistieken">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
            </button>
            <button onClick={() => setMobileOverlay("gezin")} style={btnStijl} title="Gezin">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            </button>
            <button onClick={() => setMobileOverlay("instellingen")} style={{ ...btnStijl, color: apiKey ? "rgba(255,255,255,.82)" : "#FFD580" }} title="Instellingen">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </button>
          </div>
        </header>

        {/* Pagina inhoud */}
        <main style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
          {mobilePagina === "home"        && <HomeTegels onKlik={setMobilePagina} />}
          {mobilePagina === "planner"     && <PlannerPage planning={planning} setPlanning={setPlanning} recepten={recepten} setRecepten={setRecepten} gezinData={gezinData} isMobile={isMobile} />}
          {mobilePagina === "recepten"    && <ReceptenPage recepten={recepten} setRecepten={setRecepten} isMobile={isMobile} />}
          {mobilePagina === "boodschappen"&& <BoodschappenPage planning={planning} isMobile={isMobile} />}
          {mobilePagina === "kalender"    && <KalenderPage />}
        </main>

        {/* Overlays */}
        {mobileOverlay === "gezin" && (
          <MobileSheet titel="Gezin" onSluit={() => setMobileOverlay(null)}>
            <GezinPage savedData={gezinData} onSave={(g) => { setGezinDataState(g); saveGezin(g); }} />
          </MobileSheet>
        )}
        {mobileOverlay === "statistieken" && (
          <MobileSheet titel="Statistieken" onSluit={() => setMobileOverlay(null)}>
            <StatistiekenPage recepten={recepten} planning={planning} />
          </MobileSheet>
        )}
        {mobileOverlay === "instellingen" && (
          <MobileSheet titel="Instellingen" onSluit={() => setMobileOverlay(null)}>
            <div style={{ padding: "20px 20px 40px" }}>
              <div style={{ fontSize: 12, color: G.tekstZacht, marginBottom: 8, fontWeight: 500, textTransform: "uppercase", letterSpacing: ".05em" }}>Anthropic API key</div>
              <input
                type="password"
                placeholder="sk-ant-..."
                defaultValue={apiKey}
                onBlur={e => { const k = e.target.value.trim(); setApiKeyState(k); saveApiKey(k); }}
                style={{ width: "100%", background: G.kaart, border: `1px solid ${G.zandMid}`, borderRadius: 8, padding: "10px 12px", fontSize: 14, color: G.tekst, outline: "none", fontFamily: "monospace", boxSizing: "border-box" }}
              />
              <div style={{ fontSize: 12, color: G.tekstZacht, marginTop: 8, lineHeight: 1.5 }}>
                Nodig voor PDF uitlezen van AH-facturen. Wordt lokaal opgeslagen in je browser.
              </div>
              {apiKey && <div style={{ marginTop: 10, fontSize: 13, color: G.groen, fontWeight: 500 }}>✓ API key ingesteld</div>}
            </div>
          </MobileSheet>
        )}
      </div>
    );
  }

  // ── Desktop layout ────────────────────────────────────────────────────
  const nav = [
    { key: "planner", label: "Weekplanning", icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="4" x2="9" y2="9"/></svg> },
    { key: "recepten", label: "Recepten", icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 19V6a2 2 0 012-2h12a2 2 0 012 2v13"/><path d="M4 19h16"/><path d="M8 11h8M8 15h5"/></svg> },
    { key: "boodschappen", label: "Boodschappen", icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> },
    { key: "kalender", label: "Geschiedenis", icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><circle cx="8" cy="14" r="1.2" fill="currentColor"/><circle cx="12" cy="14" r="1.2" fill="currentColor"/><circle cx="16" cy="14" r="1.2" fill="currentColor"/><circle cx="8" cy="18" r="1.2" fill="currentColor"/><circle cx="12" cy="18" r="1.2" fill="currentColor"/></svg> },
    { key: "statistieken", label: "Statistieken", icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg> },
    { key: "gezin", label: "Gezin", icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg> },
  ];

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'DM Sans',sans-serif", fontSize: 14, color: G.tekst, background: G.zand, overflow: "hidden" }}>
      <nav style={{ width: 200, background: G.groen, padding: "22px 0", display: "flex", flexDirection: "column", flexShrink: 0, height: "100vh" }}>
        <div style={{ padding: "0 20px 20px", borderBottom: "1px solid rgba(255,255,255,.1)", marginBottom: 14 }}>
          <div style={{ fontFamily: "Georgia,serif", fontSize: 17, color: "#FAFAF7", lineHeight: 1.3 }}>Tafel &amp; Week</div>
          <div style={{ fontSize: 10, color: G.groenLicht, marginTop: 3, letterSpacing: ".06em", textTransform: "uppercase" }}>Maaltijdplanner</div>
        </div>
        {nav.map(n => (
          <div key={n.key} onClick={() => setPagina(n.key)} style={{ display: "flex", alignItems: "center", gap: 9, padding: "9px 20px", color: pagina === n.key ? "#fff" : "rgba(255,255,255,.6)", cursor: "pointer", borderLeft: `3px solid ${pagina === n.key ? G.zandMid : "transparent"}`, background: pagina === n.key ? "rgba(255,255,255,.1)" : "transparent", fontSize: 13 }}>
            {n.icon}<span>{n.label}</span>
          </div>
        ))}
        <div style={{ padding: "12px 16px", marginTop: "auto", borderTop: "1px solid rgba(255,255,255,.1)" }}>
          {toonApiKey ? (
            <div>
              <div style={{ fontSize: 10, color: G.groenLicht, marginBottom: 5, letterSpacing: ".04em" }}>Anthropic API key</div>
              <input type="password" placeholder="sk-ant-..." defaultValue={apiKey} onBlur={e => { const k = e.target.value.trim(); setApiKeyState(k); saveApiKey(k); if (k) setToonApiKey(false); }} style={{ width: "100%", background: "rgba(255,255,255,.1)", border: "1px solid rgba(255,255,255,.2)", borderRadius: 6, padding: "5px 8px", fontSize: 11, color: "#fff", outline: "none", fontFamily: "monospace" }} />
              <div style={{ fontSize: 10, color: "rgba(255,255,255,.35)", marginTop: 4, lineHeight: 1.4 }}>Nodig voor PDF uitlezen &amp; boodschappenlijst. Wordt lokaal opgeslagen.</div>
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "rgba(255,255,255,.4)" }}>API key ingesteld ✓</div>
              <span onClick={() => setToonApiKey(true)} style={{ fontSize: 10, color: G.groenLicht, cursor: "pointer", textDecoration: "underline" }}>wijzig</span>
            </div>
          )}
        </div>
      </nav>
      <main style={{ flex: 1, overflowY: "auto" }}>
        {pagina === "planner"      && <PlannerPage planning={planning} setPlanning={setPlanning} recepten={recepten} setRecepten={setRecepten} gezinData={gezinData} isMobile={isMobile} />}
        {pagina === "recepten"     && <ReceptenPage recepten={recepten} setRecepten={setRecepten} isMobile={isMobile} />}
        {pagina === "boodschappen" && <BoodschappenPage planning={planning} isMobile={isMobile} />}
        {pagina === "kalender"     && <KalenderPage />}
        {pagina === "statistieken" && <StatistiekenPage recepten={recepten} planning={planning} />}
        {pagina === "gezin"        && <GezinPage savedData={gezinData} onSave={(g) => { setGezinDataState(g); saveGezin(g); }} />}
      </main>
    </div>
  );
}



ReactDOM.createRoot(document.getElementById("root")).render(<AppWithStorage />);
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.warn('SW registratie mislukt:', err));
  });
}
</script>
